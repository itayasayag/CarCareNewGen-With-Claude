    <script>

        var newName = "ללא תמונה";

        $(document).ready(function () {
            //let port = "7024";
            //server = `https://localhost:${port}`;

            /*            $('#garage').hide();*/
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            if (temp !== null) {
                document.getElementById("helloUser").innerHTML = "שלום " + tempUser.firstName;
            }
            AddCarToListFromStorage();



            var selectedCarValue = JSON.parse(localStorage.getItem('SelectedCar'));
            if (selectedCarValue != null) {
                $('#carSelect').val(selectedCarValue);//השמת הערך בבחירה
            }
            /* פותח הוספת קובץ*/
            $("#uploadrecipt").click(function () { $("#imgupload").trigger('click'); })


            ReadCity();

            ReadCarCareFromDB();

            $("#AddCareButton").click(AddCarCare);

        });


        //READ CITY FROM DB TO DDL
        function ReadCity() {
            api = server + "/api/Garage";
            ajaxCall("GET", api, "", getSCB, getECB);
        }


        function getSCB(suc) {
            AddToListCity(suc);
            /*            console.log(suc);*/

        }

        function getECB(err) {
            console.log(err);
        }


        function AddToListCity(list) {
            var str = "<select onchange='changeCitySelect()' class='carcare-select' id='selectedcity' name='city'> <option value='city'  selected='selected'>עיר</option>";
            for (var i = 0; i < list.length; i++) {
                {
                    str += `<option value='${list[i]}'>` + list[i] + '</option>';

                }
            }
            str += "</select>";
            document.getElementById("CityList").innerHTML = str;
        }

        function changeCitySelect() {
            if ($("#selectedcity").val() != "city") {
                ReadGarageFromDB();
                /*                $('#garage').show()*/
            }
        }

        //READ GARAGE FROM DB TO DDL

        function ReadGarageFromDB() {
            chosenCity = $("#selectedcity").val();
            api = server + "/api/Garage/" + chosenCity;
            ajaxCall("GET", api, "", getgarageSCB, getgarageECB);
        }

        function changeCarSelect() {//הוספת רכב ושמירת בחירה בזיכרון

            if ($("#carSelect").val() == "addCar") {
                Swal.fire({
                    title: "האם ברצונך להוסיף רכב חדש?",
                    icon: "question",
                    showCancelButton: true,
                    confirmButtonColor: "#235978",
                    cancelButtonColor: "#d33",
                    confirmButtonText: "הוסף רכב חדש",
                    cancelButtonText: "בטל",
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "addCarPage.html";
                    }
                });
                $('#carSelect').prop('selectedIndex', 0);
            }
            else {
                //שומר רק אם הוא לא בחר ערך שמי (שלא מאופשר)
                localStorage.setItem('SelectedCar', JSON.stringify($("#carSelect").val()));
                showApprovedTag();
                console.log($("#carSelect").val());

            }

        };

        function getgarageSCB(suc) {
            AddToGarageList(suc);
            console.log(suc);

        }

        function getgarageECB(err) {
            console.log(err);
        }


        function AddToGarageList(list) {
            var str = "<select class='carcare-select' id='selectedgarage' name='garage'> <option value='' disabled selected>בחר מוסך</option>";
            for (var i = 0; i < list.length; i++) {
                {
                    str += `<option value='${list[i].id}'>` + list[i].shem_mosah + '</option>';

                }
            }
            str += "</select>";
            document.getElementById("GarageList").innerHTML = str;
        }



        //Read CarCare
        function ReadCarCareFromDB() {
            api = server + "/api/CareType";
            ajaxCall("GET", api, "", getcaretypeSCB, getcaretypeECB);
        }



        function getcaretypeSCB(suc) {
            AddToCareList(suc);
            console.log(suc);

        }

        function getcaretypeECB(err) {
            console.log(err);
        }


        function AddToCareList(list) {
            var str = "<select class='carcare-select' id='selectedtype' name = 'Type' > <option value='' disabled selected>סוג טיפול</option>";
            for (var i = 0; i < list.length; i++) {
                {
                    str += `<option value='${list[i].careID}'>` + list[i].careName + '</option>';

                }
            }
            str += "</select>";
            document.getElementById("Type").innerHTML = str;
        }





        function AddCarCare() {

            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);

            var TempselectedCar = localStorage.getItem('SelectedCar');
            var selectedCar = JSON.parse(TempselectedCar);
            if (selectedCar == null) {
                Swal.fire({
                    title: "לא נבחר רכב",
                    text: "לא נבחר רכב עבורו נדרש להוסיף תיעוד",
                    icon: "question"
                })
            }
            else {

                if (tempUser.email != null) {
                    if ($("#date-input").val() == '' || $("#kilometers").val() == '' || $("#selectedgarage").val() == '' || $("#selectedtype").val() == '' || $("#cost").val() == '') {//TBD איתי חושב שסלקט זה נאלים
                        Swal.fire({
                            title: "מידע חסר",
                            text: "ודא/י שלא פספסת כלום",
                            icon: "question"
                        })
                    }
                    else {
                        uploadInvoice();
                        LogRecord = {
                            /*                            logID: 0,*/
                            useremail: tempUser.email,
                            licensePlate: parseInt(selectedCar),
                            recordDate: $("#date-input").val(),
                            currentKM: $("#kilometers").val(),
                            mispar_mosah: $("#selectedgarage").val(),
                            careID: $("#selectedtype").val(),
                            cost: $("#cost").val(),
                            notes: $("#notes").val(),
                            warrantyExpirationDate: $("#date-input").val(),
                            invoiceFileName: newName /*uploadrecipt.toString()*/,
                            careName: "",
                            garagename:""
                        }

                        api = server + "/api/Log_Record";
                        ajaxCall("POST", api, JSON.stringify(LogRecord), postSCB, postECB);
                    }
                }
                else Swal.fire({
                    title: "אינך מחובר למערכת",
                    icon: "info"
                });
            }
        }

        function postSCB(res) {
            ReadUserCarCareByEmail(JSON.parse(localStorage.getItem('LogInUser')).email);
            console.log(res);
            Swal.fire({
                title: "נוסף תיעוד טיפול",
                icon: "success"
            });

        }

        function postECB(err) {
            console.log(err);
            Swal.fire({
                title: "כשל בהוספת טיפול",
                text: "אנא בדוק את הפרטים שהוזנו במערכת",
                icon: "warning"
            });

        }



        //טיפול בתמונות
        function uploadInvoice() {

            var data = new FormData();
            var files = $("#imgupload").get(0).files;

            // Add the uploaded file to the form data collection
            if (files.length > 0) {
                for (f = 0; f < files.length; f++) {
                    var renamedFile = renameFile(files[f]);
                    data.append("files", renamedFile);
                }
            }
            else {
                return false;
            }
            api = server + "/api/Upload";
            imageFolder = server + "/images/";


            // Ajax upload
            $.ajax({
                type: "POST",
                url: api,
                contentType: false,
                processData: false,
                data: data,
                success: showImages,
                error: error
            });
            /*return false;*/

        }

        // Function to rename the file
        function renameFile(file) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var createTime = new Date();
            var currentCar = localStorage.getItem('SelectedCar');
            // Get the file extension
            var ext = file.name.split('.').pop();
            newName = tempUser.email + "_" + parseInt(currentCar.replace(/"/g, '')) + 'invoice' + "_" + createTime.getTime() + '.' + ext;
            imageFilename = newName;
            // Create a new File object with the new name
            return new File([file], newName, { type: file.type });
        }

        function showImages(data) {
            console.log(data);


            var imgStr = "";

            if (Array.isArray(data)) {

                for (var i = 0; i < data.length; i++) {
                    src = imageFolder + data[i];
                    /*imgStr += `<img src='${src}'/>`;*/
                    imgStr += `<img src='${src}'/>`;
                }

            }

            else { // just in case you have an api returning a single string
                src = imageFolder + data;
                imgStr = `<img src='${src}'/>`;
            }
            document.getElementById("uploadrecipt").src = src;
            /*document.getElementById("uplodePicture").innerHTML = imgStr;*/

            Swal.fire({
                title: "העלאת קובץ בוצעה בהצלחה!",
                icon: "success"
            });
        }

        function error(data) {
            console.log(data);
        }

        //סוף טיפול בתמונות


    </script>

<body>
    <div id="top">

        <div id="header" class="header">

            <h1 class="h1header">
                <span id="helloUser">CarCare</span>
            </h1>

            <div>
                <img onclick="document.location='HomePage.html'" id="logo" src="images/LOGO ROUND WHITE BG.png" />
                <img onclick="history.back()" id="BackBTN" src="images/back.png" />
                <a href="SignUpPage.html" id="logoutBTN">התנתק </a>
            </div>
            <div id="SelectDiv">
                <!--דיב שמוסיפים אליו את כל הרכבים-->
            </div>
        </div>
    </div>

    <div class="RollDown">
        <!--תוכן העמוד-->
        <h2 id="h2carcare">תיעוד טיפול</h2>
        <input type="file" id="imgupload" style="display:none" />
        <div id="uplodePicture"><img id="uploadrecipt" src="images/uploadrecipt.png" /></div>
        <div id="AddCareDiv">
            <!--תאריך-->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/calendar.png" />
                </div>
                <div class="col-9 rounded-input">
                    <input id="date-input" type="date" name="date" min="1" max="8" />
                </div>
            </div>
            <!-- קילומטראז -->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/odometer-for-kilometers-and-speed-control (2).png" />

                    <input id="kilometers" type="number" name="kilometrs" placeholder="קילומטראז'" />

            <!-- מוסך -->
            <div class="row">

                <div class="col-3">

                </div>
                <div class="col-6 rounded-input" id="GarageList">

                </div>


            </div>
            <!--סוג רשומה-->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/wrench (2).png" />
                </div>
                <div class="col-9 rounded-input" id="Type">
                    <select class="carcare-select" name="Type">
                        <option value="" disabled selected>סוג טיפול</option>
                        <option value="טיפול">טיפול</option>
                        <option value="תקלה">תקלה</option>
                        <option value="טסט">טסט</option>
                    </select>
                </div>
            </div>
            <!-- עלות -->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/coins.png" />
                </div>
                <div class="col-9 rounded-input">
                    <input id="cost" type="number" name="cost" placeholder="עלות" />
                </div>
            </div>
            <!--הערות-->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/notes (1).png" />
                </div>
                <div class="col-9 rounded-input">
                    <textarea id="notes" name="addnotes" placeholder="הוסף הערה" rows="4" cols="30"></textarea>
                </div>
            </div>
        </div>
    </div>
    <div>
        <div id="footerCarCare" class="footer">
            <button type="submit" class="btn btn-primary rounded-pill" id="AddCareButton">הוסף תיעוד</button>
        </div>
    </div>
