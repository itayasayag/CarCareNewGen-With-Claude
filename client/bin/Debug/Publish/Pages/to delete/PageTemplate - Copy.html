<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Locator</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }

        #cityInput {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Find Garages in Your City</h1>
    <input id="cityInput" type="text" placeholder="Enter a city">
    <button onclick="searchCity()">Search</button>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6WSDGoXyki13w_mw6pxAh3J6g5hf3GPE&callback=initMap&libraries=places" async defer></script>
    <script>
        map, service, infowindow;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 31.0461, lng: 34.8516 },
                zoom: 8
            });
            infowindow = new google.maps.InfoWindow();
        }

        function searchCity() {
            const city = document.getElementById('cityInput').value;
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: city }, (results, status) => {
                if (status === 'OK') {
                    map.setCenter(results[0].geometry.location);
                    map.setZoom(13);

                    const request = {
                        location: results[0].geometry.location,
                        radius: '5000',
                        type: ['car_repair']
                    };

                    service = new google.maps.places.PlacesService(map);
                    service.nearbySearch(request, (results, status) => {
                        if (status === google.maps.places.PlacesServiceStatus.OK) {
                            for (let i = 0; i < results.length; i++) {
                                createMarker(results[i]);
                            }
                        }
                    });
                } else {
                    alert('Geocode was not successful for the following reason: ' + status);
                }
            });
        }

        function createMarker(place) {
            const marker = new google.maps.Marker({
                map: map,
                position: place.geometry.location
            });

            google.maps.event.addListener(marker, 'click', () => {
                infowindow.setContent(`
                        <div><strong>${place.name}</strong><br>
                        ${place.vicinity}</div>
                    `);
                infowindow.open(map, marker);
            });
        }
    </script>
</body>
</html>
