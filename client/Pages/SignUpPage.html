<html>
<head>

    <script src="../JS/CarCareFunctions.js"></script>
    <link href="../CSS/StyleSheet.css" rel="stylesheet" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <meta charset="utf-8" />

    <title>התחברות / הרשמה</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico?v=3">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="../manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CarCare">
    <meta name="theme-color" content="#1E5A82">
    <link rel="apple-touch-icon" sizes="180x180" href="images/icon-180.png?v=3">
    <link rel="icon" href="images/icon-192.png">
    <title>Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/ajaxCall.js"></script>

    <script>
        $(document).ready(function () {

            var LogedIUser = localStorage.getItem('LogInUser');
            if (LogedIUser !== null) {
                window.location.href = "HomePage.html";
            }

            //let port = "7024";
            //server = `https://localhost:${port}`;

            changePageToLogIn();

            $('#RegBtn').click(postUser);
            $('#loginBtn').click(login);

            // Function to handle changes when registerOption is checked
            $('#registerToggle').change(function () {
                // Unhide all elements
                $('input, button').show();
                // Change style of #Tgl2
                $('#Tgl2').css({
                    'background-color': '#f0f0f0b0',
                    'color': '#b0b0b0'
                });
                $('#Tgl1').css({
                    'background-color': '#235978',
                    'color': '#e5e5e5'
                });
                // Hide #loginBtn and show #RegBtn
                $('#loginBtn').hide();
                $('#RegBtn').show();
                // guest login removed
                // Hide #firstName, #lastName, #phoneNumber
                $('#firstName, #lastName, #phoneNumber').show();
                $('#forgotPwWrap').hide();   // forgot-password only on login tab
            });

            // Function to handle changes when loginOption is checked
            $('#loginToggle').change(function () {
                changePageToLogIn();
            });

            function changePageToLogIn() {
                // Unhide all elements
                $('input, button').show();
                // Change style of #Tgl1
                $('#Tgl1').css({
                    'background-color': '#f0f0f0b0',
                    'color': '#b0b0b0'
                });
                $('#Tgl2').css({
                    'background-color': '#235978',
                    'color': '#e5e5e5'
                });
                // Hide #RegBtn and show #loginBtn
                $('#RegBtn').hide();
                $('#loginBtn').show();
                // Hide #firstName, #lastName, #phoneNumber
                $('#firstName, #lastName, #phoneNumber').hide();
                $('#forgotPwWrap').show();   // forgot-password only on login tab
            }
        });

        //הרשמה
        function postUser() {

            ;

            let U = {
                "firstName": $("#firstName").val(),
                "familyName": $("#lastName").val(),
                "password": $("#password").val(),
                "email": $("#email").val(),
                "phoneNum": $("#phoneNumber").val(),
                "verified": false,
            };


            if ($("#firstName").val() == "" || $("#lastName").val() == "" || $("#password").val() == "" || $("#email").val() == "" || $("#phoneNumber").val() == "") {
                Swal.fire({
                    title: "מידע חסר",
                    text: "ודא/י שלא פספסת כלום",
                    icon: "question"
                })
            }
            else {
                let api = server + "/api/users/";
                ajaxCall("POST", api, JSON.stringify(U), postSCB, postECB);
                console.log("test");
                
            }
        }

        function postSCB(res) {
            console.log(res);
            login();

        }

        function postECB(err) {
            console.log(err);
            Swal.fire({
                title: "משתמש קיים!",
                text: "האימייל קיים במערכת",
                icon: "warning"
            });
        }


        //התחברות

        function forgotPassword() {
            Swal.fire({
                title: "איפוס סיסמה",
                input: "email",
                inputLabel: "הכנס/י את כתובת המייל שלך",
                inputPlaceholder: "you@example.com",
                confirmButtonText: "המשך",
                showCancelButton: true,
                cancelButtonText: "ביטול",
                confirmButtonColor: "#1E5A82",
                inputValidator: function (value) {
                    if (!value) return "יש להכניס כתובת מייל";
                }
            }).then(function (r) {
                if (!r.isConfirmed) return;
                var email = r.value;
                Swal.fire({
                    title: "בחר/י סיסמה חדשה",
                    input: "password",
                    inputPlaceholder: "סיסמה חדשה",
                    confirmButtonText: "אפס סיסמה",
                    showCancelButton: true,
                    cancelButtonText: "ביטול",
                    confirmButtonColor: "#1E5A82",
                    inputValidator: function (value) {
                        if (!value || value.length < 4) return "סיסמה חייבת להכיל לפחות 4 תווים";
                    }
                }).then(function (r2) {
                    if (!r2.isConfirmed) return;
                    var api = server + "/api/users/reset-password";
                    ajaxCall("POST", api, JSON.stringify({ email: email, newPassword: r2.value }),
                        function () {
                            Swal.fire({ title: "הסיסמה אופסה בהצלחה", icon: "success",
                                        text: "כעת ניתן להתחבר עם הסיסמה החדשה" });
                        },
                        function (err) {
                            var msg = (err && err.status === 404)
                                ? "לא נמצא חשבון עם כתובת מייל זו"
                                : "אירעה שגיאה באיפוס הסיסמה";
                            Swal.fire({ title: msg, icon: "error" });
                        });
                });
            });
        }

        function login() {

            let U = {
                "firstName": $("#firstName").val(),
                "familyName": $("#lastName").val(),
                "password": $("#password").val(),
                "email": $("#email").val(),
                "phoneNum": $("#phoneNumber").val()
            }
            let api = server + "/api/users/login";
            ajaxCall("POST", api, JSON.stringify(U), loginSCB, loginECB);
        }

        function loginSCB(res) {
            localStorage.setItem('LogInUser', JSON.stringify(res));
            //ניסיון לשמירת פרטי רכב בעמוד התחברות
            user = res;
            ReadUserCarByEmail(user.email);
            ReadUserCarCareByEmail(user.email);

            
            Swal.fire({
                title: "ברוך הבא!",
                icon: "success"
            }).then(function () {
                window.location = "HomePage.html";
            });

        }


        function loginECB(err) {
            console.log(err);
            Swal.fire({
                title: "שגיאה",
                text: "אתה לא מחובר למערכת",
                icon: "info"	
            })
        }

        // ============================================================
        //  GOOGLE SIGN-IN
        //  Replace GOOGLE_CLIENT_ID with your real client ID from:
        //  https://console.cloud.google.com → APIs & Services → Credentials
        // ============================================================
        var GOOGLE_CLIENT_ID = "904541481429-jufnqq559gjh5gvtij15ptq883s60orl.apps.googleusercontent.com";

        function parseJwt(token) {
            var base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join('')));
        }

        function handleGoogleLogin(response) {
            var profile = parseJwt(response.credential);
            var googleUser = {
                firstName: profile.given_name || "",
                familyName: profile.family_name || "",
                email: profile.email,
                password: "",
                phoneNum: ""
            };
            var api = server + "/api/users/google-login";
            ajaxCall("POST", api, JSON.stringify(googleUser), function(res) {
                localStorage.setItem('LogInUser', JSON.stringify(res));
                ReadUserCarByEmail(res.email);
                ReadUserCarCareByEmail(res.email);
                Swal.fire({ title: "ברוך הבא, " + (profile.given_name || "") + "!", icon: "success" })
                    .then(function(){ window.location = "HomePage.html"; });
            }, function(err) {
                console.log("google login error:", err);
                localStorage.setItem('LogInUser', JSON.stringify({
                    email: googleUser.email, firstName: googleUser.firstName, familyName: googleUser.familyName
                }));
                Swal.fire({ title: "ברוך הבא, " + (profile.given_name || "") + "!", icon: "success" })
                    .then(function(){ window.location = "HomePage.html"; });
            });
        }

        window.addEventListener('load', function() {
            function tryInit() {
                if (window.google && google.accounts && google.accounts.id) {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleLogin
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("g_id_signin"),
                        { theme: "outline", size: "large", text: "signin_with", locale: "he", width: 280 }
                    );
                } else {
                    setTimeout(tryInit, 300);
                }
            }
            tryInit();
        });


    </script>
    <style>
        body {
            font-family: var(--cc-font);
            direction: rtl; /* Right-to-left text direction */
            text-align: center;
            display: block;
            overflow: auto;
        }

        input[type="text"],
        input[type="password"],
        input[type="submit"],
        input[type="tel"],
        input[type="email"],
        button {
            width: 70%;
            height: 46px;
            margin: auto;
            font-family: var(--cc-font);
            font-size: 20px;
            margin: 9px 0;
            border: solid;
            border-width: 2px;
            border-color: #e5e5e5;
            border-radius: 25px; /* Rounded corners */
            box-sizing: border-box;
            margin-left: auto;
            margin-right: auto;
            background-color: #f0f0f0b0;
            color: #235978;
        }

        input::placeholder {
            text-align: right;
            font-size: 18px;
            color: #235978;
        }

        header {
            height: 8%;
        }

        .footer {
            height: 10%;
            position: fixed;
            background-color: #235978;
            bottom: 0px;
            width: 100%;
        }

        #logo {
            width: 40%;
            margin-top: 15px;
            bottom: 60%; /*חייב להיות חצי מרוחב*/
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .plus {
            width: 100px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #RegBtn, #loginBtn {
            vertical-align: central;
            background-color: #55a35d;
            font-size: 22px;
            border: solid;
            border-width: 2px;
            border-color: #e5e5e5;
            bottom: 92%;
            position: relative;
            margin-top: 30px;
            bottom: 75px;
        }

        #btngrp {
            width: 90%;
            margin-bottom: 15px;
            margin-top: 30px;
        }

        #Tgl1, #Tgl2 {
            border-radius: 20px;
            background-color: #235978;
            border: solid;
            border-width: 2px;
            border-color: #e5e5e5;
            font-family: var(--cc-font);
            font-size: 20px;
            display: inline-block;
        }

        #Tgl2 {
            background-color: #f0f0f0b0;
            color: #b0b0b0;
        }
    </style>

    <script src="../JS/menu.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="../CSS/modern-theme.css" rel="stylesheet" />
    <link href="../CSS/gui-refresh.css" rel="stylesheet" />
</head>
<body class="page-auth">
    <div id="top">
        <div id="header" class="header">
            <h1 class="h1header">CarCare</h1>
            <!-- Logo must live inside #top: #top is position:sticky with
                 z-index:1000, so a logo placed after it gets painted under
                 the header band. -->
            <div class="miniMargin">
                <img id="logo" src="images/LOGO ROUND WHITE BG.png" />
            </div>
        </div>

    </div>


    <div class="container RollDown">

        <div class="btn-group btn-group-toggle" id="btngrp" data-toggle="buttons">
            <label class="btn btn-secondary active" id="Tgl1">
                <input type="radio" name="registerOption"
                       id="registerToggle" autocomplete="off"> הרשמה
            </label>
            <label class="btn btn-secondary" id="Tgl2">
                <input type="radio" name="loginOption"
                       id="loginToggle" autocomplete="off" checked> התחברות
            </label>
        </div>

        <form id="registrationForm" class="SignupForm" method="post" action="#">
            <div class="form-group">
                <input type="text" class="form-control" id="firstName" name="firstName" placeholder="שם פרטי" required>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="lastName" name="lastName" placeholder="שם משפחה" required>
            </div>
            <div class="form-group">
                <input type="tel" inputmode="tel" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="מספר טלפון" required>
            </div>
            <div class="form-group">
                <input type="email" class="form-control" id="email" name="email" placeholder="מייל" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="סיסמה" required>
            </div>
            <div id="forgotPwWrap">
                <a href="#" id="forgotPwLink" onclick="forgotPassword(); return false;">שכחתי סיסמה</a>
            </div>

        </form>
       
    </div>

    <div>
        <div class="footersignup">
            <button type="submit" class="btn btn-primary rounded-pill" id="RegBtn">הרשמה</button>
            <button type="submit" class="btn btn-primary rounded-pill" id="loginBtn">התחבר</button>
            <!-- Google Sign-In button -->
            <div id="googleBtnWrap" style="display:flex;justify-content:center;margin:8px auto 0;">
                <div id="g_id_signin"></div>
            </div>
            <!-- Install affordances (see install-prompt.js, shared with HomePage):
                 #installAppBtn = real one-tap install (Chrome/Edge only)
                 #installInfoBtn = subtle ⓘ shown only on iOS, opens the manual
                 Safari "Add to Home Screen" steps. -->
            <button type="button" id="installAppBtn" class="is-hidden">
                <img src="images/menu-install.png" alt="" aria-hidden="true">
                התקן אפליקציה
            </button>
            <button type="button" id="installInfoBtn" class="is-hidden" aria-label="התקנת האפליקציה">
                <span>ⓘ</span> התקנת האפליקציה
            </button>
        </div>
    </div>

    <script src="../JS/install-prompt.js"></script>

</body>
</html>
