<!DOCTYPE html>
<html>
<head>

    <script src="../JS/CarCareFunctions.js"></script>
    <link href="../CSS/StyleSheet.css" rel="stylesheet" />
    <script src="../JS/menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><!--ספריית התראות מתוקות-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="utf-8" />

    <title>התחברות / הרשמה</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="../JS/ajaxCall.js"></script>

    <script>
        $(document).ready(function () {

            var LogedIUser = localStorage.getItem('LogInUser');
            if (LogedIUser !== null) {
                window.location.href = "HomePage.html";
            }

            //let port = "7024";
            //server = `https://localhost:${port}`;

            changePageToLogIn();

            $("#Guestlogin").click(function () {
                window.location.href = "HomePage - Guest.html"
            })

            $('#RegBtn').click(postUser);
            $('#loginBtn').click(login);

            // Function to handle changes when registerOption is checked
            $('#registerToggle').change(function () {
                // Unhide all elements
                $('input, button').show();
                // Change style of #Tgl2
                $('#Tgl2').css({
                    'background-color': '#f0f0f0b0',
                    'color': '#b0b0b0'
                });
                $('#Tgl1').css({
                    'background-color': '#235978',
                    'color': '#e5e5e5'
                });
                // Hide #loginBtn and show #RegBtn
                $('#loginBtn').hide();
                $('#RegBtn').show();
                $('#Guestlogin').hide();//תוספת איתי
                // Hide #firstName, #lastName, #phoneNumber
                $('#firstName, #lastName, #phoneNumber').show();
            });

            // Function to handle changes when loginOption is checked
            $('#loginToggle').change(function () {
                changePageToLogIn();
            });

            function changePageToLogIn() {
                // Unhide all elements
                $('input, button').show();
                // Change style of #Tgl1
                $('#Tgl1').css({
                    'background-color': '#f0f0f0b0',
                    'color': '#b0b0b0'
                });
                $('#Tgl2').css({
                    'background-color': '#235978',
                    'color': '#e5e5e5'
                });
                // Hide #RegBtn and show #loginBtn
                $('#RegBtn').hide();
                $('#loginBtn').show();
                // Hide #firstName, #lastName, #phoneNumber
                $('#firstName, #lastName, #phoneNumber').hide();
            }
        });

        //הרשמה
        function postUser() {

            ;

            let U = {
                "firstName": $("#firstName").val(),
                "familyName": $("#lastName").val(),
                "password": $("#password").val(),
                "email": $("#email").val(),
                "phoneNum": $("#phoneNumber").val(),
                "verified": false,
            };


            if ($("#firstName").val() == "" || $("#lastName").val() == "" || $("#password").val() == "" || $("#email").val() == "" || $("#phoneNumber").val() == "") {
                Swal.fire({
                    title: "מידע חסר",
                    text: "ודא/י שלא פספסת כלום",
                    icon: "question"
                })
            }
            else {
                let api = server + "/api/users/";
                ajaxCall("POST", api, JSON.stringify(U), postSCB, postECB);
                console.log("test");
                
            }
        }

        function postSCB(res) {
            console.log(res);
            login();

        }

        function postECB(err) {
            console.log(err);
            Swal.fire({
                title: "משתמש קיים!",
                text: "האימייל קיים במערכת",
                icon: "warning"
            });
        }


        //התחברות

        function login() {

            let U = {
                "firstName": $("#firstName").val(),
                "familyName": $("#lastName").val(),
                "password": $("#password").val(),
                "email": $("#email").val(),
                "phoneNum": $("#phoneNumber").val()
            }
            let api = server + "/api/users/login";
            ajaxCall("POST", api, JSON.stringify(U), loginSCB, loginECB);
        }

        function loginSCB(res) {
            localStorage.setItem('LogInUser', JSON.stringify(res));
            //ניסיון לשמירת פרטי רכב בעמוד התחברות
            user = res;
            ReadUserCarByEmail(user.email);
            ReadUserCarCareByEmail(user.email);

            
            Swal.fire({
                title: "ברוך הבא!",
                icon: "success"
            }).then(function () {
                window.location = "HomePage.html";
            });

        }


        function loginECB(err) {
            console.log(err);
            Swal.fire({
                title: "שגיאה",
                text: "אתה לא מחובר למערכת",
                icon: "info"	
            })
        }


    </script>
    <style>
        body {
            direction: rtl;
            text-align: center;
            display: block;
            overflow: auto;
        }

        /* Inputs inherit the modern theme; just size + center them */
        input[type="text"], input[type="password"], input[type="tel"],
        input[type="email"], .form-control {
            width: 80%;
            height: 52px;
            margin: 12px auto !important;
            font-size: 17px;
            border: 1px solid var(--cc-line) !important;
            border-radius: 14px !important;
            box-sizing: border-box;
            background: var(--cc-surface) !important;
            box-shadow: var(--cc-shadow-sm);
            text-align: right;
            padding: 0 18px;
        }
        input::placeholder { text-align: right; color: var(--cc-muted); }

        #logo {
            width: 120px;
            margin: 10px auto 4px;
            display: block;
            padding: 8px;
            background: var(--cc-surface);
            border-radius: 50%;
            box-shadow: var(--cc-shadow-sm);
        }

        /* Segmented toggle: register / login */
        #btngrp {
            width: 80%;
            max-width: 360px;
            margin: 22px auto 8px;
            background: var(--cc-bg);
            border: 1px solid var(--cc-line);
            border-radius: 999px;
            padding: 4px;
            box-shadow: var(--cc-shadow-sm) inset;
        }
        #Tgl1, #Tgl2 {
            border-radius: 999px !important;
            font-family: var(--cc-font) !important;
            font-size: 17px !important;
            border: none !important;
            color: var(--cc-muted) !important;
            background: transparent !important;
            flex: 1;
            padding: 10px 0 !important;
            transition: background .2s ease, color .2s ease;
        }
        /* Active tab pill is set inline by the page JS via background-color;
           we make sure text stays readable */

        #RegBtn, #loginBtn {
            font-size: 18px;
            margin-top: 10px;
        }

        .footersignup {
            position: fixed;
            bottom: 0;
            padding: 14px 0 calc(14px + env(safe-area-inset-bottom));
            background: transparent;
            width: 100%;
            max-width: 480px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #Guestlogin {
            margin: 6px auto 90px;
            display: inline-block;
            background: transparent !important;
            color: var(--cc-primary) !important;
            border: 1px solid var(--cc-line) !important;
            padding: 10px 26px !important;
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="../CSS/modern-theme.css" rel="stylesheet" />
</head>
<body>
    <div id="top">
        <div id="header" class="header">
            <h1 class="h1header">CarCare</h1>
        </div>

    </div>


    <div class="container RollDown">
        <div>
            <img id="logo" src="images/LOGO ROUND WHITE BG.png" />
        </div>

        <div class="btn-group btn-group-toggle" id="btngrp" data-toggle="buttons">
            <label class="btn btn-secondary active" id="Tgl1">
                <input type="radio" name="registerOption"
                       id="registerToggle" autocomplete="off"> הרשמה
            </label>
            <label class="btn btn-secondary" id="Tgl2">
                <input type="radio" name="loginOption"
                       id="loginToggle" autocomplete="off" checked> התחברות
            </label>
        </div>

        <form id="registrationForm" class="SignupForm" method="post" action="#">
            <div class="form-group">
                <input type="text" class="form-control" id="firstName" name="firstName" placeholder="שם פרטי" required>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="lastName" name="lastName" placeholder="שם משפחה" required>
            </div>
            <div class="form-group">
                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="מספר טלפון" required>
            </div>
            <div class="form-group">
                <input type="email" class="form-control" id="email" name="email" placeholder="מייל" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="סיסמה" required>
            </div>

        </form>
       
    </div>

    <div>
        <button type="button" class="btn-secondary rounded-button" id="Guestlogin">התחבר כאורח</button>
    </div>

    <div>
        <div class="footersignup">
            <button type="submit" class="btn btn-primary rounded-pill" id="RegBtn">הרשמה</button>
            <button type="submit" class="btn btn-primary rounded-pill" id="loginBtn">התחבר</button>
        </div>
    </div>

</body>
</html>
