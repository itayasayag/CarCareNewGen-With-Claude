<!DOCTYPE html>
<html>
<head>
    <script src="../JS/CarCareFunctions.js"></script>
    <link href="../CSS/StyleSheet.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><!--ספריית התראות מתוקות-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="utf-8" />
    <title>העברת רכב</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script src="../JS/ajaxCall.js"></script>
    <!--תוספות אביעד-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!--סוף תוספות אביעד-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function () {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            if (temp !== null) {
                document.getElementById("helloUser").innerHTML = "שלום " + tempUser.firstName;
                $('#logo').click(function () { window.location.href = 'HomePage.html' })
            }
            $("#logoutBTN").click(function () {
                localStorage.clear();
                window.location.href = "SignUpPage.html"

            })
            $("#SendButton").click(function () {SendUser()})
            AddCarToInputListFromStorage();

        })

        var temp = localStorage.getItem('LogInUser');
        var StorageCarlist = JSON.parse(localStorage.getItem('UserCarlist'));
        var tempUser = JSON.parse(temp);
        userEmail = tempUser.email;

        function AddCarToInputListFromStorage() { //טיפה שונה מהוספה רגילה בגלל העיצוב הוספה בעמוד התראות
            var valueCounter = 1;/* משתנה רץ לאופשנס*/
            var str = "<select class='carcare-select' id='carSelect' name='carSelect'> <option value='' disabled selected>בחר רכב</option>";
            for (var i = 0; i < StorageCarlist.length; i++) {
                if (StorageCarlist[i].userEmail == userEmail) {
                    str += `<option value='${StorageCarlist[i].licensePlate}'>` + StorageCarlist[i].nickName + '</option>';//TBD מתלבט אם להוסיף ואליו מספר רכב
                    valueCounter++;
                }
            }
            str += "</select>";
            console.log(str);
            document.getElementById("SelectDiv").innerHTML = str;
        }

        function SendUser() {
            Swal.fire({
                title: "האם ברצונך להעביר רכב זה?",
                icon: "question",
                showDenyButton: true,
                confirmButtonText: "אישור",
                denyButtonText: `בטל`
            }).then((result) => {
                if (result.isConfirmed) {
                    TransferData = {
                        new_email: $('#SendToUser').val(),
                        old_email: tempUser.email,
                        license_plate: parseInt($("#carSelect").val())
                    }
                    api = server + "/api/usercars/transfer";
                    ajaxCall("PUT", api, JSON.stringify(TransferData), SendCarSCB, SendCarECB);

                } else if (result.isDenied) {
                    Swal.fire("העברת הרכב בוטלה", "", "error");
                }
                return false;
            });

            return false;
        }

        function SendCarSCB(suc) {

            console.log(suc);
          
            if (suc==-1) {
                Swal.fire("העברת הרכב נכשלה", "שם משתמש לא תקין", "error");
            }
            else {
                ReadUserCarByEmail(tempUser.email);
                Swal.fire({
                    title: "הרכב הועבר בהצלחה! ",
                    icon: "success",
                    showDenyButton: true,
                    confirmButtonText: "למסך הבית",
                    denyButtonText: `הוסף רכב חדש`,
                    confirmButtonColor: '#235978',
                    denyButtonColor: '#8CD4F5'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "HomePage.html"
                    }
                    else if (result.isDenied) {
                        window.location.href = "addCarPage.html"
                    }
                });
            }
 
        }

        function SendCarECB(err) {
            console.log(err);
            Swal.fire("העברת הרכב נכשלה", "נסה שנית מאוחר יותר", "error");
        }

        
    </script>

</head>
<body>
    <div id="top">
        <div class="header" , id="header">
            <h1 class="h1header">
                <span id="helloUser">CarCare</span>
            </h1>
            <a href="SignUpPage.html" id="logoutBTN">התנתק </a>
            <div>
                <img onclick="document.location='HomePage.html'" id="logo" src="images/LOGO ROUND WHITE BG.png" />
            </div>
        </div>
        <div class="miniMargin">
            <img id="BackBTN" onclick="history.back()" src="images/back.png" />
        </div>
        <h2 class="MapH2">העברת רכב</h2>
    </div>

    <div>
        <!--תוכן העמוד-->
        <div class="row">
            <!--רכב-->
            <div class="col-3">
                <img class="img-care" id="SelecCarIMG" src="images/car (3).png" />
            </div>
            <div class="col-9 rounded-input" id="SelectDiv"> </div>
        </div>

        <!--Mail-->
        <div class="row">
            <div class="col-3">
                <img class="img-care" src="images/user.png" />
            </div>
            <div class="col-9 rounded-input-Garage">
                <input id="SendToUser" type="text" placeholder="מייל משתמש מקבל" />
            </div>
        </div>

        <div class="row">
            <button id="SendButton" class="btn-default SendBTN">
                <img src="images/send.png" width="20" /> העבר רכב
            </button>
        </div>
    </div>
    <div>

        <div class="footer">
        </div>
    </div>
</body>
</html>
