    <script>

        var newName = "ללא תמונה";

        $(document).ready(function () {
            //let port = "7024";

            /*            $('#garage').hide();*/

            if (temp !== null) {
                document.getElementById("helloUser").innerHTML = "שלום " + tempUser.firstName;

            AddCarToListFromStorage();



            var selectedCarValue = JSON.parse(localStorage.getItem('SelectedCar'));
            if (selectedCarValue != null) {
                $('#carSelect').val(selectedCarValue);//השמת הערך בבחירה
            }
            /* פותח הוספת קובץ*/
            $("#uplodePicture").click(function () { $("#imgupload").trigger('click'); })

            ReadCity();

            ReadCarCareFromDB();

            // Event delegation: reliably fires for the #selectedtype <select>
            // even though it's built dynamically after the page loads.
            $(document).on('change', '#selectedtype', changeCareTypeSelect);

            $("#AddCareButton").click(AddCarCare);

        });


        // ====== Garages from data.gov.il (official garages dataset) ======
        var GOV_GARAGE_RESOURCE = "bb68386a-a331-4bbc-b668-bba2766d517d";
        var GOV_GARAGE_URL = "https://data.gov.il/api/3/action/datastore_search";

        //READ CITY LIST from the gov dataset (distinct yishuv values)
        var CITIES_LOADING = true;

        function ReadCity() {
            CITIES_LOADING = true;
            // ask for many rows but only the yishuv field, then dedupe client-side
            var url = GOV_GARAGE_URL + "?resource_id=" + GOV_GARAGE_RESOURCE +
                      "&fields=yishuv&limit=32000";
            fetch(url)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    CITIES_LOADING = false;
                    if (!data.success) { console.error("gov city fetch failed", data); return; }
                    var seen = {}, cities = [];
                    data.result.records.forEach(function (rec) {
                        var c = (rec.yishuv || "").trim();
                        if (c && !seen[c]) { seen[c] = true; cities.push(c); }
                    });
                    cities.sort(function (a, b) { return a.localeCompare(b, 'he'); });
                    AddToListCity(cities);
                    // If the user already tapped the field while we were loading,
                    // populate the open dropdown now that data has arrived.
                    if ($("#citySearchInput").is(':focus')) {
                        $("#citySearchInput").trigger('input');
                    }
                })
                .catch(function (e) {
                    CITIES_LOADING = false;
                    console.error("gov city error", e);
                });
        }

        // NOTE: the city/garage dropdowns are positioned purely via CSS now
        // (position: absolute relative to their input's wrapper). This avoids
        // a well-known iOS Safari bug where position:fixed elements don't
        // reliably track the visual viewport while the on-screen keyboard
        // opens/closes, which caused the dropdown to appear to "jump" to the
        // wrong spot. No JS recalculation needed — it just follows the page.

        var CITY_LIST = [];

        function AddToListCity(list) {
            CITY_LIST = list || [];
            // City input is already in the HTML — just wire it up
            $("#cityOptionsList").hide();
        }

        function renderCityOptions(list) {
            if (!list.length) { $("#cityOptionsList").hide(); return; }
            $("#cityOptionsList").html(
                list.map(function (c) {
                    return "<div class='garage-option' data-city='" + c.replace(/'/g, "&#39;") + "'>" + c + "</div>";
                }).join('')
            );
            $("#cityOptionsList").show();
        }

        $(document).on('input', '#citySearchInput', function () {
            var q = $(this).val().trim();
            if (!q) {
                // Empty query → show all (first 40 alphabetically)
                renderCityOptions(CITY_LIST.slice(0, 40));
                return;
            }
            var filtered = CITY_LIST.filter(function (c) { return c.includes(q); }).slice(0, 40);
            renderCityOptions(filtered);
        });

        $(document).on('focus', '#citySearchInput', function () {
            if (!CITY_LIST.length) {
                // Data still in flight — show a hint rather than nothing
                $("#cityOptionsList")
                    .html("<div class='garage-option-empty'>" +
                          (CITIES_LOADING ? "טוען ערים..." : "לא נטענו ערים") + "</div>")
                    .show();
                return;
            }
            // Show full list immediately on first tap — user shouldn't have to type first
            renderCityOptions(CITY_LIST.slice(0, 40));
        });

        $(document).on('click', '.city-option-item, #cityOptionsList .garage-option', function () {
            var city = $(this).data('city') || $(this).text().trim();
            $("#citySearchInput").val(city);
            $("#cityOptionsList").hide();
            // Reveal the garage input only once a city was chosen
            $("#CityList").removeClass('col-9').addClass('col-3');
            $("#GarageList").removeClass('is-hidden');
            // Reset and load garages for the new city
            $("#garageSearchInput").val('').attr('placeholder', 'טוען מוסכים...').prop('disabled', true);
            $("#selectedgarage").val('');
            $("#garageOptionsList").hide();
            // Store chosen city and fetch garages
            changeCitySelect(city);
        });

        // Close dropdowns when clicking elsewhere
        $(document).on('click', function (e) {
            if (!$(e.target).closest('#CityList').length) { $("#cityOptionsList").hide(); }
            if (!$(e.target).closest('#GarageList').length) { $("#garageOptionsList").hide(); }
        });

        function changeCitySelect(city) {
            if (!city) city = $("#citySearchInput").val().trim();
            if (city) { ReadGarageFromDB(city); }
        }

        function ReadGarageFromDB(chosenCity) {
            if (!chosenCity) chosenCity = $("#citySearchInput").val().trim();
            var url = GOV_GARAGE_URL + "?resource_id=" + GOV_GARAGE_RESOURCE +
                      "&q=" + encodeURIComponent(chosenCity) + "&limit=32000";
            fetch(url)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.success) { console.log("gov garage fetch failed"); return; }
                    // exact-match the city + dedupe by mispar_mosah (dataset has 1 row per profession)
                    var seen = {}, garages = [];
                    data.result.records.forEach(function (rec) {
                        if ((rec.yishuv || "").trim() !== chosenCity) return;
                        var id = rec.mispar_mosah;
                        if (id && !seen[id]) {
                            seen[id] = true;
                            garages.push({
                                id: id,
                                shem_mosah: rec.shem_mosah,
                                ktovet: rec.ktovet,
                                telephone: rec.telephone,
                                sug_mosah: rec.sug_mosah
                            });
                        }
                    });
                    garages.sort(function (a, b) {
                        return (a.shem_mosah || "").localeCompare(b.shem_mosah || "", 'he');
                    });
                    AddToGarageList(garages);
                })
                .catch(function (e) { console.log("gov garage error", e); });
        }

        function changeCarSelect() {//הוספת רכב ושמירת בחירה בזיכרון

            if ($("#carSelect").val() == "addCar") {
                Swal.fire({
                    title: "האם ברצונך להוסיף רכב חדש?",
                    icon: "question",
                    showCancelButton: true,
                    confirmButtonColor: "#235978",
                    cancelButtonColor: "#d33",
                    confirmButtonText: "הוסף רכב חדש",
                    cancelButtonText: "בטל",
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "addCarPage.html";
                    }
                });
                $('#carSelect').prop('selectedIndex', 0);
            }
            else {
                localStorage.setItem('SelectedCar', JSON.stringify($("#carSelect").val()));
                showApprovedTag();
                console.log($("#carSelect").val());
            }
        };

        var CURRENT_GARAGE_LIST = [];

        function AddToGarageList(list) {
            CURRENT_GARAGE_LIST = list || [];
            var $input = $("#garageSearchInput");
            $input.prop('disabled', false).val('').attr('placeholder', 'חפש מוסך...');
            $("#selectedgarage").val('');
            renderGarageOptions(CURRENT_GARAGE_LIST);
        }

        function renderGarageOptions(list) {
            var $list = $("#garageOptionsList");
            if (!list.length) {
                $list.html("<div class='garage-option-empty'>לא נמצאו מוסכים</div>").show();
                return;
            }
            var html = '';
            for (var i = 0; i < list.length; i++) {
                html += "<div class='garage-option' data-id='" + list[i].id + "' data-name='" +
                    String(list[i].shem_mosah || '').replace(/'/g, "&#39;") + "'>" + list[i].shem_mosah + "</div>";
            }
            $list.html(html).show();
        }

        $(document).on('focus', '#garageSearchInput', function () {
            if (!$(this).prop('disabled')) {
                renderGarageOptions(CURRENT_GARAGE_LIST);
            }
        });

        $(document).on('input', '#garageSearchInput', function () {
            var q = $(this).val().trim();
            $("#selectedgarage").val(''); // typing invalidates previous selection
            if (!q) { renderGarageOptions(CURRENT_GARAGE_LIST); return; }
            var filtered = CURRENT_GARAGE_LIST.filter(function (g) {
                return (g.shem_mosah || '').indexOf(q) !== -1;
            });
            renderGarageOptions(filtered);
        });

        $(document).on('click', '.garage-option', function () {
            var id = $(this).data('id');
            var name = $(this).data('name');
            $("#selectedgarage").val(id);
            $("#garageSearchInput").val(name);
            $("#garageOptionsList").hide();
        });




        //Read CarCare
        function ReadCarCareFromDB() {
            api = server + "/api/caretypes/";
            ajaxCall("GET", api, "", getcaretypeSCB, getcaretypeECB);
        }



        function getcaretypeSCB(suc) {
            AddToCareList(suc);
            console.log(suc);

        }

        function getcaretypeECB(err) {
            console.log(err);
        }


        function AddToCareList(list) {
            var str = "<select class='carcare-select' id='selectedtype' name = 'Type' > <option value='' disabled selected>סוג טיפול</option>";
            for (var i = 0; i < list.length; i++) {
                {
                    str += `<option value='${list[i].careID}'>` + list[i].careName + '</option>';

                }
            }
            str += "</select>";
            document.getElementById("Type").innerHTML = str;
        }

        // Insurance doesn't need a garage/location — hide that row.
        // NOTE: .hide()/.show() won't work here because #AddCareDiv .row has
        // display:flex !important in CSS which beats jQuery's inline style.
        // We use a .row-hidden CSS class that also carries !important to win.
        function changeCareTypeSelect() {
            var careId = $("#selectedtype").val();
            var careName = $("#selectedtype option:selected").text().trim();
            var isInsurance = (String(careId) === '10') || (careName.indexOf('ביטוח') !== -1);
            if (isInsurance) {
                $("#locationRow").addClass('row-hidden');
                $("#cityOptionsList").hide();
                $("#garageOptionsList").hide();
                $("#selectedgarage").val('');
                $("#garageSearchInput").val('');
                $("#citySearchInput").val('');
            } else {
                $("#locationRow").removeClass('row-hidden');
            }
        }





        function AddCarCare() {

            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);

            var TempselectedCar = localStorage.getItem('SelectedCar');
            var selectedCar = JSON.parse(TempselectedCar);
            if (selectedCar == null) {
                Swal.fire({
                    title: "לא נבחר רכב",
                    text: "לא נבחר רכב עבורו נדרש להוסיף תיעוד",
                    icon: "question"
                })
            }
            else {

                if (tempUser.email != null) {
                    if ($("#date-input").val() == '' || $("#kilometers").val() == '' || $("#selectedtype").val() == null || $("#selectedtype").val() == '' || $("#cost").val() == '') {
                        Swal.fire({
                            title: "מידע חסר",
                            text: "ודא/י שמילאת תאריך, קילומטראז', סוג טיפול ועלות",
                            icon: "question"
                        })
                    }
                    else {
                        uploadInvoice();
                        var garageVal = $("#selectedgarage").val();
                        var garageName = "";
                        if (garageVal) {
                            var match = CURRENT_GARAGE_LIST.find(function(g) { return String(g.id) === String(garageVal); });
                            if (match) garageName = match.shem_mosah || "";
                        }
                        LogRecord = {
                            /*                            logID: 0,*/
                            userEmail: tempUser.email,
                            licensePlate: parseInt(selectedCar),
                            recordDate: $("#date-input").val(),
                            currentKM: $("#kilometers").val(),
                            garageID: (garageVal && garageVal !== '0' && garageVal !== '') ? garageVal : null,
                            careID: $("#selectedtype").val(),
                            cost: $("#cost").val(),
                            notes: $("#notes").val(),
                            invoiceFileName: newName /*uploadrecipt.toString()*/,
                            careName: "",
                            garageName: garageName
                        }

                        api = server + "/api/logs/";
                        ajaxCall("POST", api, JSON.stringify(LogRecord), postSCB, postECB);
                    }
                }
                else Swal.fire({
                    title: "אינך מחובר למערכת",
                    icon: "info"
                });
            }
        }

        function postSCB(res) {
            ReadUserCarCareByEmail(JSON.parse(localStorage.getItem('LogInUser')).email);
            console.log(res);
            Swal.fire({
                title: "נוסף תיעוד טיפול",
                icon: "success",
                showDenyButton: true,
                confirmButtonText: 'חזרה לדף הבית',
                denyButtonText: 'הוסף טיפול נוסף',
                confirmButtonColor: '#1E5A82',
                denyButtonColor: '#2C7DB3'
            }).then(function (result) {
                if (result.isDenied) {
                    // Clear the form for a new entry
                    $("#date-input").val('');
                    $("#kilometers").val('');
                    $("#cost").val('');
                    $("#notes").val('');
                    $("#selectedtype").prop('selectedIndex', 0);
                    $("#locationRow").removeClass('row-hidden');   // restore garage line
                    $("#CityList").removeClass('col-3').addClass('col-9');
                    $("#GarageList").addClass('is-hidden');
                    $("#citySearchInput").val('');
                    $("#garageSearchInput").val('').attr('placeholder', 'תחילה בחר עיר').prop('disabled', true);
                    $("#selectedgarage").val('');
                    $("#garageOptionsList").hide();
                    $("#uploadrecipt").attr('src', 'images/uploadrecipt.png');
                    $("#imgupload").val('');
                    newName = "ללא תמונה";
                } else {
                    window.location.href = 'HomePage.html';
                }
            });

        }

        function postECB(err) {
            console.log(err);
            Swal.fire({
                title: "כשל בהוספת טיפול",
                text: "אנא בדוק את הפרטים שהוזנו במערכת",
                icon: "warning"
            });

        }



        //טיפול בתמונות
        function uploadInvoice() {

            var data = new FormData();
            var files = $("#imgupload").get(0).files;

            // Add the uploaded file to the form data collection
            if (files.length > 0) {
                for (f = 0; f < files.length; f++) {
                    var renamedFile = renameFile(files[f]);
                    data.append("files", renamedFile);
                }
            }
            else {
                return false;
            }
            api = server + "/api/upload/";
            imageFolder = server + "/api/upload/";


            // Ajax upload
            $.ajax({
                type: "POST",
                url: api,
                contentType: false,
                processData: false,
                data: data,
                success: showImages,
                error: error
            });
            /*return false;*/

        }

        // Function to rename the file
        function renameFile(file) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var createTime = new Date();
            var currentCar = localStorage.getItem('SelectedCar');
            // Get the file extension
            var ext = file.name.split('.').pop();
            newName = tempUser.email + "_" + parseInt(currentCar.replace(/"/g, '')) + 'invoice' + "_" + createTime.getTime() + '.' + ext;
            imageFilename = newName;
            // Create a new File object with the new name
            return new File([file], newName, { type: file.type });
        }

        function showImages(data) {
            console.log(data);
            if (data && data.uploadedFiles) data = data.uploadedFiles; // FastAPI returns {uploadedFiles: [...]}


            var imgStr = "";

            if (Array.isArray(data)) {

                for (var i = 0; i < data.length; i++) {
                    src = imageFolder + data[i];
                    /*imgStr += `<img src='${src}'/>`;*/
                    imgStr += `<img src='${src}'/>`;
                }

            }

            else { // just in case you have an api returning a single string
                src = imageFolder + data;
                imgStr = `<img src='${src}'/>`;
            }
            document.getElementById("uploadrecipt").src = src;
            /*document.getElementById("uplodePicture").innerHTML = imgStr;*/

            Swal.fire({
                title: "העלאת קובץ בוצעה בהצלחה!",
                icon: "success"
            });
        }

        function error(data) {
            console.log(data);
        }

        //סוף טיפול בתמונות


    </script>
