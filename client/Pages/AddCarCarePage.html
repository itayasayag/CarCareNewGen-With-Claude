<!DOCTYPE html>
<html>
<head>
    <title>הוסף רכב חדש</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="../CSS/StyleSheet.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="utf-8" />
    <meta name="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <script src="../JS/config.js"></script>
    <script src="../JS/ajaxCall.js"></script>
    <script src="../JS/CarCareFunctions.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v2.1.1/dist/tesseract.min.js"></script>

    <script>
        var addCarSucceed = false;
        var imageFilename = "";
        var currentUserEmail = "";

        $(document).ready(function () {
            addCarSucceed = false;

            $('#AddCarBTN').click(fixfunctionForAdd);
            $('#DeleteCarBTN').click(fixfunctionForDeActivate);
            $('#DeleteCarBTN').hide();

            var temp = localStorage.getItem('LogInUser');
            var tempUser = temp ? JSON.parse(temp) : null;

            if (tempUser && tempUser.email) {
                currentUserEmail = tempUser.email;
                document.getElementById("helloUser").innerHTML = "שלום " + tempUser.firstName;
            }

            var editmode = JSON.parse(localStorage.getItem('editMode'));
            var LplateEditedcar = JSON.parse(localStorage.getItem('SelectedCar'));

            if (editmode) {
                ChangePageAfterAdd();
                $('#DeleteCarBTN').show();
                addCarSucceed = true;
                $('#IDlicenseNum').val(LplateEditedcar);
                GetCarDetails(LplateEditedcar);
                $("#IDnickname").val(returnCarNickname(LplateEditedcar));
                $("#IDkilometer").val(returnCarKM(LplateEditedcar));
                localStorage.setItem('editMode', JSON.stringify(false));
            }
        });

        function returnCarNickname(Lplate) {
            var Cars = JSON.parse(localStorage.getItem('UserCarlist')) || [];
            for (var i = 0; i < Cars.length; i++) {
                if (String(Cars[i].licensePlate) === String(Lplate)) {
                    return Cars[i].nickName;
                }
            }
            return null;
        }

        function returnCarKM(Lplate) {
            var Cars = JSON.parse(localStorage.getItem('UserCarlist')) || [];
            for (var i = 0; i < Cars.length; i++) {
                if (String(Cars[i].licensePlate) === String(Lplate)) {
                    return Cars[i].currentKM;
                }
            }
            return null;
        }

        function uploadPIC() {
            return;
        }

        function renameFile(file) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var ext = file.name.split('.').pop();
            var newName = tempUser.email + $("#IDlicenseNum").val() + 'license' + '.' + ext;
            imageFilename = newName;
            return new File([file], newName, { type: file.type });
        }

        function showImages(data) {
            console.log(data);
            if (data && data.uploadedFiles) data = data.uploadedFiles;
            updateCarDetails();

            var imgStr = "";
            if (Array.isArray(data)) {
                for (var i = 0; i < data.length; i++) {
                    src = imageFolder + data[i];
                    imgStr += `<img src='${src}'/>`;
                }
            } else {
                src = imageFolder + data;
                imgStr = `<img class="smallImg" src='${src}'/>`;
            }

            document.getElementById("carPhoto").innerHTML = imgStr;
        }

        function error(data) {
            console.log(data);
        }

        function fixfunctionForAdd() {
            AddCar();
            return false;
        }

        function fixfunctionForUpdate() {
            updateCarDetails();
            return false;
        }

        function fixfunctionForDeActivate() {
            DeActivateUserCar();
            return false;
        }

        function AddCar() {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = temp ? JSON.parse(temp) : null;

            if (!tempUser || !tempUser.email) {
                Swal.fire({
                    title: "אינך מחובר למערכת",
                    icon: "info"
                });
                return;
            }

            if ($("#IDlicenseNum").val() == '' || $("#IDnickname").val() == '' || $("#IDkilometer").val() == '') {
                Swal.fire({
                    title: "מידע חסר",
                    text: "ודא/י שלא פספסת כלום",
                    icon: "question"
                });
                return;
            }

            var car = {
                licensePlate: parseInt($("#IDlicenseNum").val(), 10),
                nickName: $("#IDnickname").val(),
                currentKM: parseInt($("#IDkilometer").val(), 10),
                picURL: null,
                userEmail: tempUser.email,
                isVerified: false,
                isActive: true
            };

            currentUserEmail = tempUser.email;
            api = server + "/api/usercars/";
            ajaxCall("POST", api, JSON.stringify(car), postSCB, postECB);
        }

        function postSCB(res) {
            console.log(res);

            Swal.fire({
                title: "הרכב נוסף בהצלחה!",
                icon: "success"
            });

            addCarSucceed = true;
            ReadUserCarByEmail(currentUserEmail);
            ChangePageAfterAdd();
        }

        function postECB(err) {
            console.log(err);

            if (err && err.status === 409) {
                Swal.fire({
                    title: "רכב קיים",
                    text: "הרכב קיים במערכת תחת משתמש זה",
                    icon: "warning"
                });
                return;
            }

            var message = "אירעה שגיאה בחיבור לשרת או לבסיס הנתונים";
            if (err && err.responseJSON && err.responseJSON.detail) {
                message = err.responseJSON.detail;
            } else if (err && err.responseText) {
                message = err.responseText;
            }

            Swal.fire({
                title: "שגיאה בהוספת הרכב",
                text: message,
                icon: "error"
            });
        }

        function ChangePageAfterAdd() {
            $('#IDlicenseNum').prop('readonly', true);

            if ($('#updateCarDetails').length === 0) {
                $('#AddCarBTN').replaceWith('<button type="submit" class="btn btn-primary rounded-pill" id="updateCarDetails">עדכן פרטי רכב</button>');
                $('#updateCarDetails').click(fixfunctionForUpdate);
            }
        }

        function updateCarDetails() {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = temp ? JSON.parse(temp) : null;

            if (!tempUser || !tempUser.email) {
                Swal.fire({
                    title: "אינך מחובר למערכת",
                    icon: "info"
                });
                return;
            }

            var updatecar = {
                licensePlate: parseInt($("#IDlicenseNum").val(), 10),
                nickName: $("#IDnickname").val(),
                currentKM: parseInt($("#IDkilometer").val(), 10),
                picURL: imageFilename ? server + "/api/upload/" + imageFilename : null,
                userEmail: tempUser.email
            };

            var email = tempUser.email;
            var licence_plate = $("#IDlicenseNum").val();
            api = server + "/api/usercars/" + email + "/" + licence_plate;
            ajaxCall("PUT", api, JSON.stringify(updatecar), putSCB, putECB);
        }

        function putSCB(suc) {
            console.log(suc);

            Swal.fire({
                title: "פרטי הרכב עודכנו בהצלחה!",
                icon: "success"
            });

            ReadUserCarByEmail(currentUserEmail);
        }

        function putECB(err) {
            console.log(err);

            var message = "אירעה שגיאה בעדכון פרטי הרכב";
            if (err && err.responseJSON && err.responseJSON.detail) {
                message = err.responseJSON.detail;
            }

            Swal.fire({
                title: "שגיאה",
                text: message,
                icon: "error"
            });
        }

        function DeActivateUserCar() {
            Swal.fire({
                title: "האם ברצונך להסיר רכב זה?",
                text: "לאחר ביצוע הפעולה, יהיה ניתן להוסיפו שוב בהמשך",
                icon: "warning",
                showDenyButton: true,
                confirmButtonText: "מחק רכב",
                denyButtonText: `בטל`
            }).then((result) => {
                if (result.isConfirmed) {
                    var temp = localStorage.getItem('LogInUser');
                    var tempUser = temp ? JSON.parse(temp) : null;

                    if (!tempUser || !tempUser.email) {
                        Swal.fire({
                            title: "אינך מחובר למערכת",
                            icon: "info"
                        });
                        return false;
                    }

                    currentUserEmail = tempUser.email;
                    var email = tempUser.email;
                    var licence_plate = $("#IDlicenseNum").val();
                    api = server + "/api/usercars/deactivate/" + email + "/" + licence_plate;
                    ajaxCall("PUT", api, "", deacticeSCB, deacticeECB);
                } else if (result.isDenied) {
                    Swal.fire("הסרת הרכב בוטלה", "", "info");
                }

                return false;
            });

            return false;
        }

        function deacticeSCB(suc) {
            console.log(suc);
            ReadUserCarByEmail(currentUserEmail);

            Swal.fire({
                title: "הרכב הוסר בהצלחה! ",
                icon: "success",
                showDenyButton: true,
                confirmButtonText: "למסך הבית",
                denyButtonText: `הוסף רכב חדש`,
                confirmButtonColor: '#235978',
                denyButtonColor: '#8CD4F5'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "HomePage.html";
                } else if (result.isDenied) {
                    window.location.href = "addCarPage.html";
                }
            });
        }

        function deacticeECB(err) {
            console.log(err);

            var message = "אירעה שגיאה בהסרת הרכב";
            if (err && err.responseJSON && err.responseJSON.detail) {
                message = err.responseJSON.detail;
            }

            Swal.fire({
                title: "שגיאה",
                text: message,
                icon: "error"
            });
        }

        function GetCarDetails(LPlate) {
            var misparRechev = String(LPlate || "").trim();

            if (misparRechev === "") {
                return;
            }

            var resourceId = "053cea08-09bc-40ec-8f7a-156f0677aff3";
            var url = `https://data.gov.il/api/3/action/datastore_search?resource_id=${resourceId}&q=${misparRechev}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (!data.success || !data.result || !Array.isArray(data.result.records) || data.result.records.length === 0) {
                        Swal.fire({
                            title: "מספר רישוי זה אינו מופיע במערכת",
                            icon: "error"
                        }).then(function () {
                            $("#IDlicenseNum").val("");
                        });
                        return;
                    }

                    const records = data.result.records;
                    localStorage.setItem('vehicleDetails', JSON.stringify(records));
                    ShowCarDetails(records);
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    Swal.fire({
                        title: "שגיאה בבדיקת מספר הרכב",
                        text: "נסה/י שוב בעוד רגע",
                        icon: "error"
                    });
                });
        }

        function CheckOcrResult(vehicleDetailsArry) {
            let OCRresult = sessionStorage.getItem('ocrResult');
            let check = true;
            tmpstr = "<div class='ocrAlert'>";

            if (OCRresult !== null) {
                console.log("Retrieved string:", OCRresult);
                OCRresult = OCRresult.replace(/\s+/g, '');
            } else {
                console.log("No string found in localStorage under 'OCRresult'.");
                check = false;
            }

            if (OCRresult.includes('רישיוןרכב')) {
                tmpstr += '<pre>' + "✅ רישיון רכב" + '</pre>';
            } else {
                tmpstr += '<pre>' + "❌ רישיון רכב" + '</pre>';
                check = false;
            }

            if (OCRresult.includes(vehicleDetailsArry[0].tozeret_cd)) {
                tmpstr += '<pre>' + "✅ ארץ ייצור" + '</pre>';
            } else {
                tmpstr += '<pre>' + "❌ ארץ ייצור" + '</pre>';
                check = false;
            }

            if (OCRresult.includes(vehicleDetailsArry[0].degem_manoa)) {
                tmpstr += '<pre>' + "✅ דגם מנוע" + '</pre>';
            } else {
                tmpstr += '<pre>' + "❌ דגם מנוע" + '</pre>';
                check = false;
            }

            if (OCRresult.includes(vehicleDetailsArry[0].mispar_rechev)) {
                tmpstr += '<pre>' + "✅ מספר רכב" + '</pre>';
            } else {
                tmpstr += '<pre>' + "❌ מספר רכב" + '</pre>';
                check = false;
            }

            tmpstr += '</div>';
            localStorage.setItem('Verifiedvehicle', check);

            if (check) {
                temp1 = localStorage.getItem('LogInUser');
                tempUser = JSON.parse(temp1);
                api = server + "/api/usercars/verify/" + tempUser.email + "/" + vehicleDetailsArry[0].mispar_rechev;
                ajaxCall("PUT", api, "", verSCB, verECB);

                function verSCB(suc) {
                    console.log("1");
                }

                function verECB(err) {
                    console.log(err);
                }

                Swal.fire({
                    title: "האימות הצליח",
                    html: tmpstr,
                    icon: "success"
                });
            } else {
                Swal.fire({
                    title: "האימות נכשל",
                    html: tmpstr,
                    icon: "error"
                });
            }
        }

        function ShowCarDetails(CarDetails) {
            if (!CarDetails || !CarDetails[0]) {
                return;
            }

            document.getElementById("IDmanufacturer").innerHTML = CarDetails[0].tozeret_nm || "";
            document.getElementById("IDmodel").innerHTML = CarDetails[0].kinuy_mishari || "";
            document.getElementById("IDSubModel").innerHTML = CarDetails[0].ramat_gimur || "";
            document.getElementById("IDYearOfManu").innerHTML = CarDetails[0].moed_aliya_lakvish || "";

            if (localStorage.getItem('UserCarlist') != null) {
                var Cars = JSON.parse(localStorage.getItem('UserCarlist')) || [];
                for (var i = 0; i < Cars.length; i++) {
                    if (String(Cars[i].licensePlate) === String($("#IDlicenseNum").val()) && Cars[i].isVerified) {
                        document.getElementById("carPhoto").innerHTML = '<p>בוצע אימות עבור רכב זה</p>';
                        document.getElementById("carPhoto").innerHTML += `<img src="images/Approved.png" />`;
                        $('#file-input').hide();
                        $('#plussign').hide();
                        break;
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: Calibri, sans-serif;
            direction: rtl;
            text-align: center;
        }

        input[type="text"],
        input[type="password"],
        input[type="submit"],
        input[type="tel"],
        input[type="email"],
        button {
            width: 70%;
            height: 50px;
            margin: auto;
            font-family: Calibri;
            font-size: 25px;
            margin: 15px 0;
            border: solid;
            border-width: 2px;

        input::placeholder {

        header {

        .footer {

        }

        #logoutBTN {
            color: white;

            font-size: 22px;
            text-align: left;
            width: 98%;
        }

        #AddCarBTN,
        #updateCarDetails {
            vertical-align: central;
            background-color: #55a35d;
            font-size: 22px;
            border: solid;
            border-width: 2px;
            border-color: #e5e5e5;

            margin-top: 30px;
        }

        #DeleteCarBTN {
            display: none;
        }

        #file-input {
            display: none;
        }

        #carPhoto > img {
            max-height: 30%;
            max-width: 40%;
        }

        #loader {
            display: none;
            position: fixed;
            left: 30%;
            top: 40%;
            transform: translate(-50%, -50%);
            border: 16px solid #235978;
            border-radius: 50%;
            border-top: 16px solid #e6eef2;
            width: 150px;
            height: 150px;
            animation: spin 7s linear infinite;
            text-align: center;
            line-height: 25px;
            color: #235978;
            font-size: 30px;
            place-content: center;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #progressText {
            position: absolute;
            top: calc(50% + 70px);
            left: 50%;
            transform: translate(-50%, -50%);
            color: #3498db;
            font-size: 18px;
        }
    </style>

<body>
    <div id="top">
        <div id="header" class="header">
            <h1 class="h1header">
                <span id="helloUser">CarCare</span>
            </h1>
            <a href="SignUpPage.html" id="logoutBTN">התנתק </a>
            <div>
                <img onclick="document.location='HomePage.html'" id="logo" src="images/LOGO ROUND WHITE BG.png" />
                <img id="BackBTN" onclick="history.back()" src="images/back.png" />
            </div>
        </div>
    </div>

    <div class="RollDown">
        <div class="container">
            <form id="registrationForm" method="post" action="#">
                <div class="form-group">
                    <input onfocusout="GetCarDetails($(this).val())" type="number" class="form-control" id="IDlicenseNum" name="licenseNum" placeholder="מספר רישוי" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" id="IDnickname" name="nickname" placeholder="כינוי רכב" required>
                </div>
                <div class="form-group">
                    <input type="number" class="form-control" id="IDkilometer" name="kilometer" placeholder="קילומטר נוכחי" required>
                </div>

                <button type="submit" class="btn btn-primary rounded-pill" id="AddCarBTN">הוסף רכב</button>
                <button type="submit" class="btn btn-danger rounded-pill" id="DeleteCarBTN">הסר רכב זה</button>
            </form>
        </div>

        <div id="CarDetails" class="container">
            <div class="row">
                <div class="col-6">
                    <p><b>יצרן</b>:&nbsp;<span id="IDmanufacturer">  </span></p>
                    <p><b>דגם</b>:&nbsp; <span id="IDmodel"></span></p>
                </div>
                <div class="col-6">
                    <p><b>מועד עליה לכביש:</b>&nbsp; <span id="IDYearOfManu"></span></p>
                    <p><b>תת דגם:</b>&nbsp; <span id="IDSubModel"></span></p>
                </div>
            </div>
        </div>
    </div>
