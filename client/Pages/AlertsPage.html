    <script src="../JS/config.js"></script>

    <script>
        $(document).ready(function () {
            //let port = "7024";
            //server = `https://localhost:${port}`;

            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(localStorage.getItem('LogInUser'));
            if (tempUser != null) {
                document.getElementById("helloUser").innerHTML = "שלום " + tempUser.firstName;
            }

            $('#AddAlertBTN').click(AddAlert);
            AddCarToAlertsListFromStorage();

            $('#carSelect').change(function () {//שומר בחירת רכב נוכחי בזיכרון
                localStorage.setItem('SelectedCar', JSON.stringify($(this).val()))
                console.log($(this).val());
            });

            ReadCareTypeFromDB();

        })

        function ReadCareTypeFromDB() {
        
            api = server + "/api/caretypes/";
            ajaxCall("GET", api, "", getcaretypeSCB, getcaretypeECB);
        }



        function getcaretypeSCB(suc) {
            AddToCareList(suc);
            console.log(suc);

        }

        function getcaretypeECB(err) {
            console.log(err);
        }

        function AddToCareList(list) {
            var str = "<select class='carcare-select' id='CareTypeAlert' name = 'Type' > <option value='' disabled selected>סוג טיפול</option>";
            for (var i = 0; i < list.length; i++) {
                {
                    str += `<option value='${list[i].careID}'>` + list[i].careName +'</option>';

                }
            }
            str += "</select>";
            document.getElementById("Type").innerHTML = str;
        }

        function AddAlert()
        {

            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            if (tempUser.email != null)
            {
                if (($("#date-input").val() == ''))
                {
                    Swal.fire({
                        title: "נדרש להזין תאריך?",
                        icon: "warning"
                    });
                    $("#date-input").val("");
                    return;
 
                }

                if (($("#date-input").val() == '') || $("#carSelect").val() == null || $("#CareTypeAlert").val() == null) { 
                //בדיקת שדות

                    Swal.fire({
                        title: "מידע חסר",
                        text: "ודא/י שלא פספסת כלום",
                        icon: "question"
                    })
                    return;
                }

                Reminder = {
                    email: tempUser.email,
                    remindDate: $("#date-input").val(),
                    notes: $("#notes").val(),
                    careID: $("#CareTypeAlert").val(),
                    licensePlate: $("#carSelect").val()

                }

                api = server + "/api/reminders/";
                ajaxCall("POST", api, JSON.stringify(Reminder), postSCB, postECB);

            }


            else
            {
                Swal.fire({
                    title: "אינך מחובר למערכת",
                    icon: "info"
                });
                
            }

        }

        function postSCB(res) {

            console.log(res);
            Swal.fire({
                title: "נוספה תזכורת",
                icon: "success"
            });

        }

        function postECB(err) {
            console.log(err);
            Swal.fire({
                title: "כשל בהוספת תזכורת",
                text: "אנא בדוק שכל הפרטים הוזנו",
                icon: "warning"
            });

        }

    </script>

    <script src="../JS/menu.js"></script>

<body class="page-alerts">
    <div id="top">
        <div class="header" , id="header">
            <h1 class="h1header">
                <span id="helloUser">CarCare</span>
            </h1>
            <a href="SignUpPage.html" id="logoutBTN">התנתק </a>
            <div>
                <img onclick="document.location='HomePage.html'" id="logo" src="images/LOGO ROUND WHITE BG.png" />
                <img id="BackBTN" onclick="history.back()" src="images/back.png" />
                <h2 class="addNotih2">תזכורת חדשה</h2>
                <img class="bellAlerts" src="images/BellBlue.png" />
            </div>
        </div>
    </div>
    <!--תוכן העמוד-->
    <div class="RollDown">


        <div id="AddNoteDiv">
            <!--רכב-->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" id="SelecCarIMG" src="images/car (3).png" />
                </div>
                <div class="col-9 rounded-input" id="SelectDiv">
                    <!--נכנס לפה מידע מהפונקציה AddCarToAlertsListFromStorage-->
                </div>
            </div>
            <!--סוג רשומה-->
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/wrench (2).png" />
                </div>
                <div class="col-9 rounded-input" id="Type">
                </div>
            </div>

            <!--<div class="NoteType">-->
            <!--תאריך-->
            <p class="NotePara">בתאריך:</p>
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/calendar.png" />
                </div>
                <div class="col-9 rounded-input">
                    <input id="date-input" type="date" name="date" min="1" max="8" />
                </div>
            </div>
            <div class="row">
                <div class="col-3">
                    <img class="img-care" src="images/notes (1).png" />
                </div>
                <div class="col-9 rounded-input">
                    <textarea id="notes" name="addnotes" placeholder="הוסף הערה" rows="4" cols="30"></textarea>
                </div>
            </div>
        </div>

    </div>
    <div>
        <div id="footerCarCare" class="footer">
            <button type="submit" class="btn btn-primary rounded-pill" id="AddAlertBTN">הוסף תזכורת</button>
        </div>
    </div>
</body>
