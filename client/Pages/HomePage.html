        function AddReminderList(list) {
            var str = "";
            for (var i = 0; i < list.length; i++) {
                {
                    var tempDate = ParseDate(list[i].remindDate);
                    if (tempDate != "1/1/1900") {
                        str += `<div class='reminderinnerDiv'>  <button class='remove-reminder' onclick='removeReminder(${list[i].reminderID}); event.stopPropagation();'><b> X</b> </button>

                            ' </b>' + list[i].careName  +' ' + list[i].notes + '</button></div>';
                    }
                }
            }
            document.getElementById("ReminderList").innerHTML = str;
            // No reminders → collapse the white panel, keep only the bell
            if (str === "") {
                $(".alertsDiv").addClass("no-reminders");
            } else {
                $(".alertsDiv").removeClass("no-reminders");
            }
        }

        function ParseDate(date) {
            var tempdate = new Date(date);
            var day = tempdate.getDate();
            var month = tempdate.getMonth() + 1; 
            var year = tempdate.getFullYear();

            var formattedDate = day + '/' + month + '/' + year;
            return formattedDate;
        }

        function readDashboardStorage(key) {
            try {
                return JSON.parse(localStorage.getItem(key));
            } catch (error) {
                return null;
            }
        }

        function escapeDashboardText(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDashboardDate(value) {
            var date = new Date(value);
            if (isNaN(date.getTime())) return '—';
            return date.toLocaleDateString('he-IL');
        }

        function renderDesktopCarDashboard() {
            var dashboard = document.getElementById('desktopCarDashboard');
            if (!dashboard) return;

            var selectedCar = readDashboardStorage('SelectedCar');
            var cars = readDashboardStorage('UserCarlist') || [];
            var selected = cars.find(function (car) {
                return String(car.licensePlate) === String(selectedCar);
            });

            if (!selectedCar) {
                dashboard.classList.add('is-empty');
                dashboard.innerHTML = '<div class="desktop-car-empty">בחר רכב מהתפריט העליון כדי להציג את הדשבורד שלו</div>';
                return;
            }

            if (!selected) {
                dashboard.classList.add('is-empty');
                dashboard.innerHTML = '<div class="desktop-car-empty">טוען את נתוני הרכב הנבחר...</div>';
                return;
            }

            dashboard.classList.remove('is-empty');
            var logs = (readDashboardStorage('UserCarCarelist') || [])
                .filter(function (log) { return String(log.licensePlate) === String(selectedCar); })
                .sort(function (a, b) { return new Date(b.recordDate) - new Date(a.recordDate); });
            var reminders = (readDashboardStorage('UserReminders') || [])
                .filter(function (reminder) { return String(reminder.licensePlate) === String(selectedCar); })
                .filter(function (reminder) { return !isNaN(new Date(reminder.remindDate).getTime()); })
                .sort(function (a, b) { return new Date(a.remindDate) - new Date(b.remindDate); });

            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var upcomingReminder = reminders.find(function (reminder) {
                return new Date(reminder.remindDate) >= today;
            });
            var maxKM = Number(selected.currentKM) || 0;
            logs.forEach(function (log) {
                var km = Number(log.currentKM) || 0;
                if (km > maxKM) maxKM = km;
            });

            var lastLog = logs[0];
            var recentHtml = logs.slice(0, 3).map(function (log) {
                return '<div class="desktop-car-activity-item">' +
                    '<span class="desktop-car-activity-name">' + escapeDashboardText(log.careName || 'תיעוד טיפול') + '</span>' +
                    '<span>' + formatDashboardDate(log.recordDate) + '</span>' +
                    '<span>' + Number(log.currentKM || 0).toLocaleString('he-IL') + ' ק״מ</span>' +
                    '</div>';
            }).join('');
            if (!recentHtml) {
                recentHtml = '<div class="desktop-car-activity-empty">עדיין אין תיעודים לרכב הזה</div>';
            }

            var verifiedLabel = selected.isVerified ? 'רכב מאומת' : 'ממתין לאימות';
            var verifiedClass = selected.isVerified ? ' is-verified' : '';
            var lastTreatment = lastLog
                ? escapeDashboardText(lastLog.careName || 'טיפול') + '<small>' + formatDashboardDate(lastLog.recordDate) + '</small>'
                : '—';
            var nextReminder = upcomingReminder
                ? escapeDashboardText(upcomingReminder.careName || 'תזכורת') + '<small>' + formatDashboardDate(upcomingReminder.remindDate) + '</small>'
                : 'אין התראה קרובה';

            dashboard.innerHTML =
                '<div class="desktop-car-identity">' +
                '  <div class="desktop-car-icon"><img src="images/car_icon.png" alt="" /></div>' +
                '  <div class="desktop-car-name">' + escapeDashboardText(selected.nickName || 'הרכב שלי') + '</div>' +
                '  <div class="desktop-car-plate">מ.ר. ' + escapeDashboardText(selected.licensePlate) + '</div>' +
                '  <div class="desktop-car-status' + verifiedClass + '">' + verifiedLabel + '</div>' +
                '  <button type="button" class="desktop-car-book-link" onclick="window.location.href=\'CarBookPage.html\'">לספר הרכב <span aria-hidden="true">←</span></button>' +
                '</div>' +
                '<div class="desktop-car-overview">' +
                '  <div class="desktop-car-metrics">' +
                '    <div class="desktop-car-metric"><span>קילומטראז׳ אחרון</span><strong>' + maxKM.toLocaleString('he-IL') + '<small> ק״מ</small></strong></div>' +
                '    <div class="desktop-car-metric"><span>תיעודים</span><strong>' + logs.length + '</strong></div>' +
                '    <div class="desktop-car-metric"><span>טיפול אחרון</span><strong>' + lastTreatment + '</strong></div>' +
                '    <div class="desktop-car-metric is-reminder"><span>התראה קרובה</span><strong>' + nextReminder + '</strong></div>' +
                '  </div>' +
                '  <div class="desktop-car-activity"><span class="desktop-car-activity-title">תיעודים אחרונים</span>' + recentHtml + '</div>' +
                '</div>';
        }


        function UpdateReminder(rID,Rdate,note) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var reminderArray = JSON.parse(localStorage.getItem('UserReminders'));
            for (var i = 0; i < reminderArray.length; i++) {
                if (reminderArray[i].reminderID == rID) {
                    UpdateReminder = {
                        reminderID: rID,
                        remindDate: Rdate,
                        notes: note,
                        email: reminderArray[i].email,
                        careID: reminderArray[i].careID,
                        licensePlate: reminderArray[i].licensePlate
                      
                    }
                    break;
                }
               
            }
          
            api = server + "/api/reminders/" + rID;
            ajaxCall("PUT", api, JSON.stringify(UpdateReminder), UpdateReminderSCB, UpdateReminderECB);

        }

        function formatDateString(dateString) {
           
            var parts = dateString.split('/');

    
            var day = parseInt(parts[0], 10);
            var month = parseInt(parts[1], 10);
            var year = parseInt(parts[2], 10);

        
            var dateObject = new Date(year, month-1, day+1); 

      
            var formattedDate = dateObject.toISOString().split('T')[0];

            return formattedDate;
        }

        var quickNewName = "ללא תמונה";
        var QUICK_GARAGE_RESOURCE = "bb68386a-a331-4bbc-b668-bba2766d517d";

        function ReadQuickCity() {
            QUICK_CITIES_LOADING = true;
            var url = QUICK_GARAGE_URL + "?resource_id=" + QUICK_GARAGE_RESOURCE + "&fields=yishuv&limit=32000";
            fetch(url)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    QUICK_CITIES_LOADING = false;
                    if (!data.success) { console.error("gov city fetch failed", data); return; }
                    var seen = {}, cities = [];
                    data.result.records.forEach(function (rec) {
                        var c = (rec.yishuv || "").trim();
                        if (c && !seen[c]) { seen[c] = true; cities.push(c); }
                    });
                    cities.sort(function (a, b) { return a.localeCompare(b, 'he'); });
                    QUICK_CITY_LIST = cities;
                    $("#quickCityOptionsList").hide();
                })
                .catch(function (e) {
                    QUICK_CITIES_LOADING = false;
                    console.error("gov city error", e);
                });
        }

        function renderQuickCityOptions(list) {
            if (!list.length) { $("#quickCityOptionsList").hide(); return; }
            $("#quickCityOptionsList").html(

                }).join('')
            ).show();
        }

        $(document).on('input', '#quickCitySearchInput', function () {

            renderQuickCityOptions(QUICK_CITY_LIST.filter(function (c) { return c.includes(q); }).slice(0, 40));

                    .show();

            }
            renderQuickCityOptions(QUICK_CITY_LIST.slice(0, 40));
        });

        function ReadQuickGarageFromDB(chosenCity) {
            if (!chosenCity) chosenCity = $("#quickCitySearchInput").val().trim();
            var url = QUICK_GARAGE_URL + "?resource_id=" + QUICK_GARAGE_RESOURCE + "&q=" + encodeURIComponent(chosenCity) + "&limit=32000";
            fetch(url)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.success) { console.log("gov garage fetch failed"); return; }
                    var seen = {}, garages = [];
                    data.result.records.forEach(function (rec) {
                        if ((rec.yishuv || "").trim() !== chosenCity) return;
                        var id = rec.mispar_mosah;
                        if (id && !seen[id]) {
                            seen[id] = true;
                            garages.push({
                                id: id,
                                shem_mosah: rec.shem_mosah,
                                ktovet: rec.ktovet,
                                telephone: rec.telephone,
                                sug_mosah: rec.sug_mosah
                            });
                        }
                    });
                    garages.sort(function (a, b) {
                        return (a.shem_mosah || "").localeCompare(b.shem_mosah || "", 'he');
                    });
                    AddToQuickGarageList(garages);
                })
                .catch(function (e) { console.log("gov garage error", e); });
        }

        function AddToQuickGarageList(list) {
            QUICK_CURRENT_GARAGE_LIST = list || [];
            $("#quickGarageSearchInput").prop('disabled', false).val('').attr('placeholder', 'חפש מוסך...');
            $("#quickSelectedgarage").val('');
            renderQuickGarageOptions(QUICK_CURRENT_GARAGE_LIST);
        }

        function renderQuickGarageOptions(list) {
            var $list = $("#quickGarageOptionsList");
            if (!list.length) {
                $list.html("<div class='garage-option-empty'>לא נמצאו מוסכים</div>").show();
                return;
            }
            var html = '';
            for (var i = 0; i < list.length; i++) {
                html += "<div class='garage-option' data-id='" + list[i].id + "' data-name='" +
                    String(list[i].shem_mosah || '').replace(/'/g, "&#39;") + "'>" + list[i].shem_mosah + "</div>";
            }
            $list.html(html).show();
        }

        $(document).on('focus', '#quickGarageSearchInput', function () {
            if (!$(this).prop('disabled')) {
                renderQuickGarageOptions(QUICK_CURRENT_GARAGE_LIST);
            }
        });

        $(document).on('input', '#quickGarageSearchInput', function () {
            var q = $(this).val().trim();
            $("#quickSelectedgarage").val('');
            if (!q) { renderQuickGarageOptions(QUICK_CURRENT_GARAGE_LIST); return; }
            renderQuickGarageOptions(QUICK_CURRENT_GARAGE_LIST.filter(function (g) {
                return (g.shem_mosah || '').indexOf(q) !== -1;
            }));
        });

        $(document).on('click', '#quickGarageOptionsList .garage-option', function () {
            $("#quickSelectedgarage").val($(this).data('id'));
            $("#quickGarageSearchInput").val($(this).data('name'));
            $("#quickGarageOptionsList").hide();
        });

        function ReadQuickCarCareFromDB() {
            api = server + "/api/caretypes/";
            ajaxCall("GET", api, "", getQuickCaretypeSCB, getQuickCaretypeECB);
        }

        function getQuickCaretypeSCB(suc) {
            AddToQuickCareList(suc);
        }

        function getQuickCaretypeECB(err) {
            console.log(err);
        }

        function AddToQuickCareList(list) {
            var str = "<select class='carcare-select' id='quickSelectedtype' name='Type'><option value='' disabled selected>סוג טיפול</option>";
            for (var i = 0; i < list.length; i++) {
                str += `<option value='${list[i].careID}'>` + list[i].careName + '</option>';
            }
            str += "</select>";
            document.getElementById("QuickType").innerHTML = str;
        }

        function changeQuickCareTypeSelect() {
            var careId = $("#quickSelectedtype").val();
            var careName = $("#quickSelectedtype option:selected").text().trim();
            var isInsurance = (String(careId) === '10') || (careName.indexOf('ביטוח') !== -1);
            if (isInsurance) {
                $("#quickLocationRow").addClass('row-hidden');
                $("#quickCityOptionsList, #quickGarageOptionsList").hide();
                $("#quickSelectedgarage").val('');
                $("#quickGarageSearchInput").val('');
                $("#quickCitySearchInput").val('');
            } else {
                $("#quickLocationRow").removeClass('row-hidden');
            }
        }

        function AddQuickCarCare() {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var selectedCar = $("#quickCarSelect").val() || JSON.parse(localStorage.getItem('SelectedCar'));

            if (selectedCar == null || selectedCar === '') {
                Swal.fire({
                    title: "לא נבחר רכב",
                    text: "לא נבחר רכב עבורו נדרש להוסיף תיעוד",
                    icon: "question"
                });
                return;
            }

            if (tempUser.email == null) {
                Swal.fire({
                    title: "אינך מחובר למערכת",
                    icon: "info"
                });
                return;
            }

            if ($("#quick-date-input").val() == '' || $("#quick-kilometers").val() == '' || $("#quickSelectedtype").val() == null || $("#quickSelectedtype").val() == '' || $("#quick-cost").val() == '') {
                Swal.fire({
                    title: "מידע חסר",
                    text: "ודא/י שמילאת תאריך, קילומטראז', סוג טיפול ועלות",
                    icon: "question"
                });
                return;
            }

            uploadQuickInvoice(selectedCar);
            var garageVal = $("#quickSelectedgarage").val();
            var garageName = "";
            if (garageVal) {
                var match = QUICK_CURRENT_GARAGE_LIST.find(function (g) { return String(g.id) === String(garageVal); });
                if (match) garageName = match.shem_mosah || "";
            }

            LogRecord = {
                userEmail: tempUser.email,
                licensePlate: parseInt(selectedCar),
                recordDate: $("#quick-date-input").val(),
                currentKM: $("#quick-kilometers").val(),
                garageID: (garageVal && garageVal !== '0' && garageVal !== '') ? garageVal : null,
                careID: $("#quickSelectedtype").val(),
                cost: $("#quick-cost").val(),
                notes: $("#quick-notes").val(),
                invoiceFileName: quickNewName,
                careName: "",
                garageName: garageName
            };

            api = server + "/api/logs/";
            ajaxCall("POST", api, JSON.stringify(LogRecord), quickPostSCB, quickPostECB);
        }

        function quickPostSCB(res) {
            ReadUserCarCareByEmail(JSON.parse(localStorage.getItem('LogInUser')).email, renderDesktopCarDashboard);
            console.log(res);
            Swal.fire({
                title: "נוסף תיעוד טיפול",
                icon: "success",
                showDenyButton: true,
                confirmButtonText: 'חזרה לדף הבית',
                denyButtonText: 'הוסף טיפול נוסף',
                confirmButtonColor: '#1E5A82',
                denyButtonColor: '#2C7DB3'
            }).then(function (result) {
                if (result.isDenied) {
                    resetQuickCareForm();
                } else {
                    closeQuickCareSheet();
                    resetQuickCareForm();
                }
            });
        }

        function quickPostECB(err) {
            console.log(err);
            Swal.fire({
                title: "כשל בהוספת טיפול",
                text: "אנא בדוק את הפרטים שהוזנו במערכת",
                icon: "warning"
            });
        }

        function resetQuickCareForm() {
            $("#quick-date-input").val('');
            $("#quick-kilometers").val('');
            $("#quick-cost").val('');
            $("#quick-notes").val('');
            $("#quickSelectedtype").prop('selectedIndex', 0);
            $("#quickLocationRow").removeClass('row-hidden');
            $("#QuickCityList").removeClass('col-3').addClass('col-9');
            $("#QuickGarageList").addClass('is-hidden');
            $("#quickCitySearchInput").val('');
            $("#quickGarageSearchInput").val('').attr('placeholder', 'תחילה בחר עיר').prop('disabled', true);
            $("#quickSelectedgarage").val('');
            $("#quickGarageOptionsList").hide();
            $("#quickUploadrecipt").attr('src', 'images/uploadrecipt.png');
            $("#quickImgupload").val('');
            quickNewName = "ללא תמונה";
        }

        function uploadQuickInvoice(selectedCar) {
            var data = new FormData();
            var files = $("#quickImgupload").get(0).files;
            if (files.length > 0) {
                for (f = 0; f < files.length; f++) {
                    data.append("files", renameQuickFile(files[f], selectedCar));
                }
            }
            else {
                return false;
            }
            api = server + "/api/upload/";
            imageFolder = server + "/api/upload/";

            $.ajax({
                type: "POST",
                url: api,
                contentType: false,
                processData: false,
                data: data,
                success: showQuickImages,
                error: quickUploadError
            });
        }

        function renameQuickFile(file, selectedCar) {
            var tempUser = JSON.parse(localStorage.getItem('LogInUser'));
            var createTime = new Date();
            var ext = file.name.split('.').pop();
            quickNewName = tempUser.email + "_" + parseInt(selectedCar) + 'invoice' + "_" + createTime.getTime() + '.' + ext;
            return new File([file], quickNewName, { type: file.type });
        }

        function showQuickImages(data) {
            if (data && data.uploadedFiles) data = data.uploadedFiles;
            var src = "";
            if (Array.isArray(data)) {
                for (var i = 0; i < data.length; i++) {
                    src = imageFolder + data[i];
                }
            }
            else {
                src = imageFolder + data;
            }
            if (src) document.getElementById("quickUploadrecipt").src = src;
            Swal.fire({
                title: "העלאת קובץ בוצעה בהצלחה!",
                icon: "success"
            });
        }

        function quickUploadError(data) {
            console.log(data);
        }
       
       

    </script>
