        function changeCarSelect()
        {//הוספת רכב ושמירת בחירה בזיכרון

                    cancelButtonColor: "#d33",
                    confirmButtonText: "הוסף רכב חדש",

                }).then((result) => {
                    if (result.isConfirmed) {

                    }
                });
                $('#carSelect').prop('selectedIndex', 0);
            }
           else {
               //שומר רק אם הוא לא בחר ערך שמי (שלא מאופשר)
               LP = JSON.stringify($("#carSelect").val());
               localStorage.setItem('SelectedCar', LP);
               showApprovedTag();//הצגת האישור ברכב מאושר
               GetSelectedCarDetails($("#carSelect").val());
               console.log($("#carSelect").val());
           }

        };     

        function ReadRemindersFromDB() {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            api = server + "/api/reminders/" + tempUser.email;
            ajaxCall("GET", api, "", getReminderSCB, getReminderECB);
        }

        function getReminderSCB(suc) {
            var reminder = JSON.stringify(suc);
            localStorage.setItem('UserReminders', reminder);
            AddReminderList(suc);
            console.log(suc);
        }

        function getReminderECB(err) {
            console.log(err);
        }

        function AddReminderList(list) {
            var str = "";
            for (var i = 0; i < list.length; i++) {
                {
                    var tempDate = ParseDate(list[i].remindDate);
                    if (tempDate != "1/1/1900") {
                        str += `<div class='reminderinnerDiv'>  <button class='remove-reminder' onclick='removeReminder(${list[i].reminderID}); event.stopPropagation();'><b> X</b> </button>
                        <button Class='reminder-item' data-careid='${list[i].careID}' onclick='handleReminderClick(${list[i].reminderID},"${tempDate}",  "${list[i].notes}")' value='${list[i].reminderID}'><b>` + tempDate + '<br>' + list[i].carNickname +
                            ' </b>' + list[i].careName  +' ' + list[i].notes + '</button></div>';
                    }
                }
            }
            document.getElementById("ReminderList").innerHTML = str;
        }

        function removeReminder(reminderID) {
            Swal.fire({
                title: "האם אתה בטוח שברצונך למחוק את התזכורת?",
                text: "במידה וכן לא תינתן אפשרות לשחזר אותה",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                cancelButtonColor: "#3085d6",
                confirmButtonText: "  מחק תזכורת",
                cancelButtonText: "ביטול"
            })
                .then((result) => {
                    if (result.isConfirmed) {
                        DELREMINDER = {
                            reminderID: reminderID,
                            remindDate: "2024-07-22T18:30:21.629Z",
                            notes: "",
                            email: 'string',
                            careID: 0,
                            licensePlate: 0
                        }

                        api = server + "/api/reminders/" + reminderID;
                        ajaxCall("DELETE", api, JSON.stringify(DELREMINDER), RemoveReminderSCB, RemoveReminderECB);

             
                    } else {
                        Swal.fire("התזכורת לא נמחקה", "התזכורת שלך לא נמחקה.", "info");
                    }
                });
        }


        function RemoveReminderSCB(suc) {
            Swal.fire({
                title: "התזכורת נמחקה בהצלחה!!",
                icon: "success"
            })
            ReadRemindersFromDB();
            console.log(suc);

        }

        function RemoveReminderECB(err) {
            Swal.fire({
                title: "כשל",
                icon: "warning"
            })

            console.log(err);
        }
        function ParseDate(date) {
            var tempdate = new Date(date);
            var day = tempdate.getDate();
            var month = tempdate.getMonth() + 1; 
            var year = tempdate.getFullYear();

            var formattedDate = day + '/' + month + '/' + year;
            return formattedDate;
        }


        function UpdateReminder(rID,Rdate,note) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var reminderArray = JSON.parse(localStorage.getItem('UserReminders'));
            for (var i = 0; i < reminderArray.length; i++) {
                if (reminderArray[i].reminderID == rID) {
                    UpdateReminder = {
                        reminderID: rID,
                        remindDate: Rdate,
                        notes: note,
                        email: reminderArray[i].email,
                        careID: reminderArray[i].careID,
                        licensePlate: reminderArray[i].licensePlate
                      
                    }
                    break;
                }
               
            }
          
            api = server + "/api/reminders/" + rID;
            ajaxCall("PUT", api, JSON.stringify(UpdateReminder), UpdateReminderSCB, UpdateReminderECB);

        }

        function UpdateReminderSCB(suc) {
            Swal.fire({
                title: "ההתראה עודכנה בהצלחה!",
                icon: "success"
            });
            ReadRemindersFromDB();
            console.log(suc);

        }

        function UpdateReminderECB(err) {
            Swal.fire({
                title: "כשל",
                icon: "warning"
            })
            
            console.log(err);
        }

        function handleReminderClick(ReminderID, date,note) {

            var REMINDERDATE = formatDateString(date);



            Swal.fire({
                title: 'עריכת התראה',
                html: `
                
            <div style="align-items: center;">
                <label for="date">תאריך</label>
                 <input type="date" id="Rdate" class="swal2-input" value= ${REMINDERDATE}>
               
            </div>
            <br>
            <div style="align-items: center;">
                <label for="notes">הערה</label>
                 <textarea id="Rnotes" class="swal2-input"  > ${note} </textarea>
                
            </div>

        `,
                showCancelButton: true,
                confirmButtonText: 'שמור',
                cancelButtonText: 'בטל',
            
                
            }).then((result) => {
                if (result.isConfirmed) {
                    const date = document.getElementById('Rdate').value;
                    const notes = document.getElementById('Rnotes').value;
                    UpdateReminder(ReminderID, date, notes);
                }
            });
        }


        function formatDateString(dateString) {
           
            var parts = dateString.split('/');

    
            var day = parseInt(parts[0], 10);
            var month = parseInt(parts[1], 10);
            var year = parseInt(parts[2], 10);

        
            var dateObject = new Date(year, month-1, day+1); 

      
            var formattedDate = dateObject.toISOString().split('T')[0];

            return formattedDate;
        }

        function ReadCareTypeName(id)
        {
            api = server + "/api/caretypes/" + id;
            ajaxCall("GET", api, "", getTypeNameSCB, getTypeNameECB);
        }

        function getTypeNameSCB(suc) {

            console.log(suc);
            return suc;

        }

        function getTypeNameECB(err) {
            console.log(err);
        }
       
       

    </script>
