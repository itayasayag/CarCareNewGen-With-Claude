<!DOCTYPE html>
<html>
<head>
    <script src="../JS/CarCareFunctions.js"></script>
    <link href="../CSS/StyleSheet.css" rel="stylesheet" />
    <script src="../JS/menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><!--ספריית התראות מתוקות-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="utf-8" />
    <title>מצא מוסכים</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script src="../JS/ajaxCall.js"></script>
    <!--תוספות אביעד-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!--סוף תוספות אביעד-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function () {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            if (temp !== null) {
                document.getElementById("helloUser").innerHTML = "שלום " + tempUser.firstName;
                $('#logo').click(function () { window.location.href = 'HomePage.html' })
            }
            else {
                $('#logo').click(function () { window.location.href = 'HomePage - Guest.html' })
            }

            $("#logoutBTN").click(function () {
                localStorage.clear();
                window.location.href = "SignUpPage.html"

            })
        })
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="../CSS/modern-theme.css" rel="stylesheet" />
</head>
<body>
    <div id="top">
        <div class="header" , id="header">
            <h1 class="h1header">
                <span id="helloUser">CarCare</span>
            </h1>
            <a href="SignUpPage.html" id="logoutBTN">התנתק </a>
            <div>
                <img onclick="document.location='HomePage.html'" id="logo" src="images/LOGO ROUND WHITE BG.png" />
            </div>
        </div>
        <div>
            <img id="BackBTN" onclick="history.back()" src="images/back.png" />
        </div>
        <h2 class="MapH2">חיפוש מוסך</h2>
    </div>
    <!--תוכן העמוד-->
    <div class="RollDown">
        <div class="row">
            <!--דיב שורת חיפוש-->
            <div class="col-3">
                <img class="img-care" src="images/seatchround.png" onclick="searchCity()" />
            </div>
            <div class="col-9 rounded-input-Garage" id="GarageList">
                <input id="cityInput" type="text" name="location" placeholder="בחר/י עיר" />
            </div>
        </div>
        <div>
            <div id="map"></div>

            <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6WSDGoXyki13w_mw6pxAh3J6g5hf3GPE&callback=initMap&libraries=places"></script>
        </div>
    </div>
    <div>
        <div class="footer">
        </div>
    </div>
</body>
</html>
