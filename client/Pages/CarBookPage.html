            $("#exportPDF").click(function () {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const divIds = ['fristIconRow', 'secondIconRow', 'CarBook']; // IDs of the divs you want to include
                let promises = [];

                // Add title and image to the top of the page
                const title = "";
                const logoPath = "images/LOGO ROUND WHITE BG.png";
                const logoWidth = 20; // width in mm
                const logoHeight = 20; // height in mm
                const titleFontSize = 20;
                const textColor = "#235978";
                const margin = 10; // margin from page edges

                // Fetch 'SelectedCar' from local storage
                const selectedCar = JSON.parse(localStorage.getItem('SelectedCar')) || 'Unknown';

                // Add a date and time stamp
                const currentDate = new Date();
                const dateString = `${currentDate.toLocaleDateString()} ${currentDate.toLocaleTimeString()}`;

                // Generate the images for the divs
                divIds.forEach(id => {
                    const div = document.getElementById(id);
                    if (div) {
                        promises.push(html2canvas(div, { scale: 2 }).then(canvas => {
                            return canvas.toDataURL('image/png');
                        }));
                    }
                });

                Promise.all(promises).then(images => {
                    // Define page size
                    const imgWidth = 190; // Width with margin
                    const pageHeight = 295; // A4 height in mm
                    let yOffset = margin; // Start from top margin

                    // Add the title and logo image to the PDF
                    doc.setFontSize(titleFontSize);
                    doc.setFont("Calibri");
                    doc.text(title, 105, yOffset, { align: 'center' }); // Title at the center
                    doc.addImage(logoPath, 'PNG', margin, margin, logoWidth, logoHeight); // Logo at the top-left corner
                    doc.setFontSize(titleFontSize);
                    doc.setTextColor(textColor);
                    doc.text("CarCare", logoWidth + 20, margin + 10); // Add text next to the logo

                    // Add the date and time in the top-right corner
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0); // Black color for date
                    doc.text(dateString, 200, margin + 10, { align: 'right' });

                    // Add the SelectedCar value to the center of the page
                    doc.setFontSize(16);
                    doc.setTextColor(textColor);
                    doc.text(`Car-Book of: ${selectedCar}`, 105, yOffset + 30, { align: 'center' }); // Positioned just below the title
                    let CarLplate = localStorage.getItem("SelectedCar");
                    let pdfFileName = 'CarCareFile' + CarLplate + 'CarBook.pdf'
                    
                    // Add images of divs
                    let position = yOffset + 50; // Start below the SelectedCar text
                    images.forEach((imgData, index) => {
                        const img = new Image();
                        img.src = imgData;
                        img.onload = function () {
                            const imgHeight = img.height * imgWidth / img.width;

                            // Adjust the image height to fit within the page
                            if (position + imgHeight > pageHeight - margin) {
                                position = margin; // Reset position to top
                                doc.addPage();
                            }

                            // Add image to the PDF
                            doc.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
                            position += imgHeight + 10; // Add some space between images

                            // Save the PDF once all images are processed
                            if (index === images.length - 1) {
                                doc.save(pdfFileName);
                            }
                        };
                    });
                }).catch(error => {
                    console.error('Error generating PDF:', error);
                });
            });

        function setImageSrc(element) {

        function getLastCareInfo() {
            //השמת ערך תאריך טסט הבא
            if (localStorage.getItem('vehicleDetails') != null) {
                document.getElementById("CareType6").innerHTML = JSON.parse(localStorage.getItem('vehicleDetails'))[0].tokef_dt;
            }
            var tmpCarelist = JSON.parse(localStorage.getItem('UserCarCarelist'));
            var selectedCar = JSON.parse(localStorage.getItem('SelectedCar'));
            var MaxKM = document.getElementById("CareType9").innerHTML;
            var logSTR = "";
            for (var i = 0; i < tmpCarelist.length; i++) {
                if (tmpCarelist[i].licensePlate == selectedCar) {

                    let DateString = new Date(tmpCarelist[i].recordDate);
                    let Now = new Date();
                    let formattedDate = DateString.toLocaleDateString();
                    divID = "CareType" + tmpCarelist[i].careID;

                    logSTR += '<tr>';
                    logSTR += '<td>' + formattedDate + '</td>';
                    logSTR += '<td> <button onclick="editCare(' + tmpCarelist[i].logID +')" style="border:none; background:none; padding:0; margin:0; font-family:inherit; font-size:inherit; cursor:pointer;">' + tmpCarelist[i].carename +  '</button> </td>'

                    logSTR += '<td>' + tmpCarelist[i].currentKM + '</td>';
                    if (tmpCarelist[i].invoiceFileName != "ללא תמונה") {
                        logSTR += '<td><img class="invoiceIcon" src="images/invoice1.png" data-src1="'+ server+ /images/ + tmpCarelist[i].invoiceFileName + '" data-toggle="modal" data-target="#imageModal" onclick="setImageSrc(this)"></td>';
                    }
                    else {
                        logSTR += '<td></td>';
                    }
                    logSTR += '</tr>';
                    document.getElementById("carBookTbl").innerHTML += logSTR;
                    logSTR = "";
                    

                    if (document.getElementById(divID) != null) {
                        divIdValue = document.getElementById(divID).innerHTML;
                        if (divIdValue == "טרם תועד" || divIdValue < tmpCarelist[i].recordDate) {

                            let numOfDays = Math.round((Now - DateString) / (1000 * 60 * 60 * 24));//המרה מ:מילישניות לימים
                            document.getElementById(divID).innerHTML = '<p>' + formattedDate + '</p>';
                            tmpstr = '<p';
                            if (numOfDays > 0) {
                                if (numOfDays > 330) {
                                    tmpstr += ` style ="color: red; font-weight:bold"`;
                                }
                                document.getElementById(divID).innerHTML += tmpstr + '>לפני ' + numOfDays + ' ימים</p>';
                            }
                            else {
                                document.getElementById(divID).innerHTML += '<p>תיעוד עתידי</p>';
                            }

                        }

                    }






                    if (MaxKM == "טרם תועד" || tmpCarelist[i].currentKM > MaxKM) {
                        MaxKM = tmpCarelist[i].currentKM;
                    }
                }
            }
            document.getElementById("CareType9").innerHTML = MaxKM + ' ק"מ ';



        }

        function ParseDate(date) {

            return formattedDate;
        }

        function showDetails() {
            document.getElementById('showDetails').addEventListener('click', function () {
                // Retrieve data from local storage
                const storedData = localStorage.getItem('vehicleDetails');
                console.log("Stored Data:", storedData); // Debugging line

                if (storedData) {
                    // Parse the JSON data and access the first element
                    const vehicleDetailsArray = JSON.parse(storedData);
                    const vehicleDetails = vehicleDetailsArray[0];
                    console.log("Parsed Vehicle Details:", vehicleDetails); // Debugging line

                    // Define the keys to display and their corresponding labels
                    const displayFields = {
                        "mispar_rechev": "מספר רישוי",
                        "tozeret_nm": "יצרן",
                        "kinuy_mishari": "דגם",
                        "ramat_gimur": "רמת גימור",
                        "shnat_yitzur": "שנת ייצור",
                        "sug_delek_nm": "סוג דלק",
                        "tzeva_rechev": "צבע",
                        "baalut": "בעלות",
                        "mivchan_acharon_dt": "מבחן רישוי אחרון"
                    };

                    // Construct the HTML table with the selected vehicle details
                    let tableHtml = '<table class="vehicle-details-table">';
                    /*tableHtml += '<tr><th>Field</th><th>Value</th></tr>';*/

                    let hasContent = false;

                    for (const [key, label] of Object.entries(displayFields)) {
                        if (vehicleDetails[key] !== undefined) {
                            tableHtml += `<tr><td class="label">${label}</td><td class="value">${vehicleDetails[key]}</td></tr>`;
                            hasContent = true;
                        } else {
                            console.log(`Key not found in vehicleDetails: ${key}`); // Debugging line
                        }
                    }

                    tableHtml += '</table>';

                    if (hasContent) {
                        Swal.fire({
                            title: 'פרטי הרכב',
                            html: tableHtml,
                            width: '80%',
                            customClass: {
                                container: 'custom-swal-container',
                                title: 'custom-swal-title',
                                htmlContainer: 'custom-swal-html-container',
                                confirmButton: 'custom-swal-confirm-button'
                            },
                            confirmButtonText: 'סגור'
                        });
                    } else {
                        Swal.fire({
                            icon: 'info',
                            title: 'No Data',
                            text: 'No relevant vehicle details found to display!',
                        });
                    }
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'מצטערים...',
                        text: 'לא נמצאו נתונים עבור הרכב הנבחר',
                    });
                }
            });
        }

        function formatToDDMMYYYY(isoDate) {
            const date = new Date(isoDate);
            const day = String(date.getDate()).padStart(2, '0'); // Day of the month
            const month = String(date.getMonth() + 1).padStart(2, '0'); // Months are 0-based
            const year = date.getFullYear(); // Full year
            return `${day}/${month}/${year}`;
        }

        function uploadInvoice() {
            var temp = sessionStorage.getItem("TemplogRecord");
            var TempLogRecord = JSON.parse(temp);
            var data = new FormData();
            var files = $("#imgupload").get(0).files;

            // Add the uploaded file to the form data collection
            if (files.length > 0) {
                for (f = 0; f < files.length; f++) {
                    var renamedFile = renameFile(files[f]);
                    data.append("files", renamedFile);
                   
                }
            }
            else {
                newName = TempLogRecord[0].invoiceFileName;
                return false;
            }
            api = server + "/api/Upload";
            imageFolder = server + "/images/";


            // Ajax upload
            $.ajax({
                type: "POST",
                url: api,
                contentType: false,
                processData: false,
                data: data,
                success: success,
                error: error
            });
            /*return false;*/

        }

        // Function to rename the file
        function renameFile(file) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var createTime = new Date();
            var currentCar = localStorage.getItem('SelectedCar');
            // Get the file extension
            var ext = file.name.split('.').pop();
            newName = tempUser.email + "_" + parseInt(currentCar.replace(/"/g, '')) + 'invoice' + "_" + createTime.getTime() + '.' + ext;
            imageFilename = newName;
            // Create a new File object with the new name
            return new File([file], newName, { type: file.type });
        }

        function success(data) {
            console.log(data);
        }

        function error(data) {
            console.log(data);
        }
