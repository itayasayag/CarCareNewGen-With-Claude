            $("#exportPDF").click(function () {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const divIds = ['careCarousel', 'CarBook']; // IDs of the divs you want to include
                let promises = [];

                // Add title and image to the top of the page
                const title = "";
                const logoPath = "images/LOGO ROUND WHITE BG.png";
                const logoWidth = 20; // width in mm
                const logoHeight = 20; // height in mm
                const titleFontSize = 20;
                const textColor = "#235978";
                const margin = 10; // margin from page edges

                // Fetch 'SelectedCar' from local storage
                const selectedCar = JSON.parse(localStorage.getItem('SelectedCar')) || 'Unknown';

                // Add a date and time stamp
                const currentDate = new Date();
                const dateString = `${formatToDDMMYYYY(currentDate)} ${currentDate.toLocaleTimeString('he-IL')}`;

                // Generate the images for the divs
                divIds.forEach(id => {
                    const div = document.getElementById(id);
                    if (div) {
                        promises.push(html2canvas(div, { scale: 2 }).then(canvas => {
                            return canvas.toDataURL('image/png');
                        }));
                    }
                });

                Promise.all(promises).then(images => {
                    // Define page size
                    const imgWidth = 190; // Width with margin
                    const pageHeight = 295; // A4 height in mm
                    let yOffset = margin; // Start from top margin

                    // Add the title and logo image to the PDF
                    doc.setFontSize(titleFontSize);
                    doc.setFont("Calibri");
                    doc.text(title, 105, yOffset, { align: 'center' }); // Title at the center
                    doc.addImage(logoPath, 'PNG', margin, margin, logoWidth, logoHeight); // Logo at the top-left corner
                    doc.setFontSize(titleFontSize);
                    doc.setTextColor(textColor);
                    doc.text("CarCare", logoWidth + 20, margin + 10); // Add text next to the logo

                    // Add the date and time in the top-right corner
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0); // Black color for date
                    doc.text(dateString, 200, margin + 10, { align: 'right' });

                    // Add the SelectedCar value to the center of the page
                    doc.setFontSize(16);
                    doc.setTextColor(textColor);
                    doc.text(`Car-Book of: ${selectedCar}`, 105, yOffset + 30, { align: 'center' }); // Positioned just below the title
                    let CarLplate = localStorage.getItem("SelectedCar");
                    let pdfFileName = 'CarCareFile' + CarLplate + 'CarBook.pdf'
                    
                    // Add images of divs
                    let position = yOffset + 50; // Start below the SelectedCar text
                    images.forEach((imgData, index) => {
                        const img = new Image();
                        img.src = imgData;
                        img.onload = function () {
                            const imgHeight = img.height * imgWidth / img.width;

                            // Adjust the image height to fit within the page
                            if (position + imgHeight > pageHeight - margin) {
                                position = margin; // Reset position to top
                                doc.addPage();
                            }

                            // Add image to the PDF
                            doc.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
                            position += imgHeight + 10; // Add some space between images

                            // Save the PDF once all images are processed
                            if (index === images.length - 1) {
                                doc.save(pdfFileName);
                            }
                        };
                    });
                }).catch(error => {
                    console.error('Error generating PDF:', error);
                });
            });

            1: "החלפת שמן",

        function wireTreatmentCards() {
            var carousel = document.getElementById('careCarousel');
            if (!carousel) return;
            var cards = carousel.querySelectorAll('.mainscreenimg');

            cards.forEach(function (card) {
                var typeP = card.querySelector('p[id^="CareType"]');
                if (!typeP) return;
                var careId = parseInt(typeP.id.replace('CareType', ''), 10);
                var headline = card.querySelector('.carbookheadline');
                var careName = headline ? headline.textContent.trim() : (TREATMENT_TYPES[careId] || '');
                card.style.cursor = 'pointer';
                card.addEventListener('click', function () {
                    // tapping a side card centers it; tapping the centered card opens it
                    if (!card.classList.contains('cc-active')) {
                        card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                        return;
                    }
                    if (careId === 9) { openKMUpdate(); }
                    else { openAddTreatment(careId, careName); }
                });
            });

            // Highlight whichever card is nearest the carousel center
            function updateActive() {
                var rect = carousel.getBoundingClientRect();
                var center = rect.left + rect.width / 2;
                var best = null, bestDist = Infinity;
                cards.forEach(function (c) {
                    var r = c.getBoundingClientRect();
                    var d = Math.abs((r.left + r.width / 2) - center);
                    if (d < bestDist) { bestDist = d; best = c; }
                });
                cards.forEach(function (c) { c.classList.toggle('cc-active', c === best); });
            }
            var raf;
            carousel.addEventListener('scroll', function () {
                window.cancelAnimationFrame(raf);
                raf = window.requestAnimationFrame(updateActive);
            });
            window.addEventListener('resize', updateActive);
            // Center the first treatment card (index 1, skipping KM) once laid out
            function initCarousel() {
                // Priority 1: find an overdue card (red text inside lowerline)
                var target = null;
                cards.forEach(function(c) {
                    if (!target) {
                        var lower = c.querySelector('.lowerline');
                        if (lower && lower.querySelector('[style*="color:#E5484D"], [style*="color: #E5484D"], [style*="color: red"], [style*="color:red"]')) {
                            target = c;
                        }
                    }
                });
                // Priority 2: the yearly test card (CareType5)
                if (!target) {
                    cards.forEach(function(c) {
                        if (!target && c.querySelector('#CareType5')) target = c;
                    });
                }
                // Fallback: second card (skip KM)
                if (!target) target = cards[1] || cards[0];

                if (target) {
                    var rect = carousel.getBoundingClientRect();
                    var r = target.getBoundingClientRect();
                    var delta = (r.left + r.width / 2) - (rect.left + rect.width / 2);
                    carousel.scrollLeft += delta;
                }
                updateActive();
            }
            // run a few times as layout/fonts settle
            setTimeout(initCarousel, 60);
            setTimeout(updateActive, 300);
            setTimeout(updateActive, 700);
        }

                    '  <input type="number" id="t_cost" class="swal2-input" placeholder="0">' +
                    '  <label style="font-weight:600;">הערות</label>' +

            var temp = sessionStorage.getItem("TemplogRecord");

             </div>
         <br>

             <div style="font-size:13px;color:#1E5A82;margin-top:4px;">לחץ להעלאת קבלה</div>
         </div>

     `,

                showCancelButton: true,
                confirmButtonText: 'שמור',
                cancelButtonText: 'בטל',
                preConfirm: function () {
                    return {
                        cost: document.getElementById('Lcost').value,
                        notes: document.getElementById('Lnotes').value
                    };
                }

            }).then((result) => {
                if (result.isConfirmed) {
                    uploadInvoice();
                    UpdateLogRecord(index, TempLogRecord[0].currentKM, result.value.cost, result.value.notes, TempLogRecord[0].careID, newName)

                }
            });
            $("#uploadreciptswal").click(function () {
                $("#imgupload").trigger('click');
            });





        }
        function formatToDDMMYYYY(isoDate) {
            const date = new Date(isoDate);
            const day = String(date.getDate()).padStart(2, '0'); // Day of the month
            const month = String(date.getMonth() + 1).padStart(2, '0'); // Months are 0-based
            const year = date.getFullYear(); // Full year
            return `${day}/${month}/${year}`;
        }

        function uploadInvoice() {
            var temp = sessionStorage.getItem("TemplogRecord");
            var TempLogRecord = JSON.parse(temp);
            var data = new FormData();
            var files = $("#imgupload").get(0).files;

            // Add the uploaded file to the form data collection
            if (files.length > 0) {
                for (f = 0; f < files.length; f++) {
                    var renamedFile = renameFile(files[f]);
                    data.append("files", renamedFile);
                   
                }
            }
            else {
                newName = TempLogRecord[0].invoiceFileName;
                return false;
            }
            api = server + "/api/upload/";
            imageFolder = server + "/api/upload/";


            // Ajax upload
            $.ajax({
                type: "POST",
                url: api,
                contentType: false,
                processData: false,
                data: data,
                success: success,
                error: error
            });
            /*return false;*/

        }

        // Function to rename the file
        function renameFile(file) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            var createTime = new Date();
            var currentCar = localStorage.getItem('SelectedCar');
            // Get the file extension
            var ext = file.name.split('.').pop();
            newName = tempUser.email + "_" + parseInt(currentCar.replace(/"/g, '')) + 'invoice' + "_" + createTime.getTime() + '.' + ext;
            imageFilename = newName;
            // Create a new File object with the new name
            return new File([file], newName, { type: file.type });
        }

        function success(data) {
            console.log(data);
        }

        function error(data) {
            console.log(data);
        }



    </script>
