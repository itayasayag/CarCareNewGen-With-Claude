        function returnCarNickname(Lplate) {
            Cars = JSON.parse(localStorage.getItem('UserCarlist'))
            for (var i = 0; i < Cars.length; i++) {
                if (Cars[i].licensePlate == Lplate) {
                    return Cars[i].nickName;
                }
            }
            return null;
        }

        function returnCarKM(Lplate) {
            Cars = JSON.parse(localStorage.getItem('UserCarlist'))
            for (var i = 0; i < Cars.length; i++) {
                if (Cars[i].licensePlate == Lplate) {
                    return Cars[i].currentKM;
                }
            }
            return null;
        }


        // DISABLED: car license upload feature — re-enable when needed (remove the return below)
        function uploadPIC() {
            return; // DISABLED
            if (!addCarSucceed) {
                Swal.fire({
                    title: "לא בוצעה הוספת רכב",
                    icon: "error"
                });
                return 0;
            }

            var data = new FormData();
            var files = $("#file-input").get(0).files;

            // Add the uploaded file to the form data collection
            if (files.length > 0) {
                for (f = 0; f < files.length; f++) {
                    var renamedFile = renameFile(files[f]);
                    data.append("files", renamedFile);
                }
            }
            api = server + "/api/upload/";
            imageFolder = server + "/api/upload/";


            // Ajax upload
            $.ajax({
                type: "POST",
                url: api,
                contentType: false,
                processData: false,
                data: data,
                success: showImages,
                error: error
            });

            $("#loader").show();

            // OCR Processing
            const file = files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        // Convert to grayscale and enhance contrast
                        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        let data = imageData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                            const contrast = avg > 128 ? 255 : 0; // simple contrast enhancement
                            data[i] = data[i + 1] = data[i + 2] = contrast;
                        }
                        ctx.putImageData(imageData, 0, 0);

                        Tesseract.recognize(
                            canvas.toDataURL(),
                            'heb+eng', // Recognize Hebrew and English
                            {
                                tessedit_char_whitelist: '0123456789א-ת!?@#$%&*()', // Include Hebrew characters and symbols
                                tessedit_pageseg_mode: 'single_block', // page segmentation mode
                                logger: m => console.log(m)
                            }
                        ).then(({ data: { text } }) => {
                            const tmpSTR = text.trim() || "No text found";
                            sessionStorage.setItem('ocrResult', tmpSTR);
                            // Hide loader
                            $("#loader").hide();
                            CheckOcrResult(JSON.parse(localStorage.getItem('vehicleDetails')));
                            
                        });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            return false;

        }

        // Function to rename the file
        function renameFile(file) {
            var temp = localStorage.getItem('LogInUser');
            var tempUser = JSON.parse(temp);
            // Get the file extension
            var ext = file.name.split('.').pop();
            var newName = tempUser.email + $("#IDlicenseNum").val() + 'license' + '.' + ext;
            imageFilename = newName;
            // Create a new File object with the new name
            return new File([file], newName, { type: file.type });
        }

        function showImages(data) {

            //Swal.fire({

            //    icon: "success"
            //});

            if (Array.isArray(data)) {

                for (var i = 0; i < data.length; i++) {
                    src = imageFolder + data[i];
                    imgStr += `<img src='${src}'/>`;
                }

            }

            else { // just in case you have an api returning a single string
                src = imageFolder + data;
                imgStr = `<img class="smallImg" src='${src}'/>`;
            }

            document.getElementById("carPhoto").innerHTML = imgStr;
        }

        function GetCarDetails(LPlate) {
            var misparRechev = LPlate;
            var resourceId = "053cea08-09bc-40ec-8f7a-156f0677aff3";
            var url = `https://data.gov.il/api/3/action/datastore_search?resource_id=${resourceId}&q=${misparRechev}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const records = data.result.records;
                        localStorage.setItem('vehicleDetails', JSON.stringify(records));
                        ShowCarDetails(JSON.parse(localStorage.getItem('vehicleDetails')));
                    } else {
                        console.error("Failed to fetch data:", data);

                    }
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    Swal.fire({ // במידה והרכב לא מופיע במערכת
                        title: "מספר רישוי זה אינו מופיע במערכת",
                        icon: "error"
                    }).then(function () {
                        $("#IDlicenseNum").val("");
                    });
                });


        }
